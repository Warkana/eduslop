<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiagent Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 300px;
      --sidebar-bg: #0f172a;
      --sidebar-hover: rgba(255,255,255,0.04);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-light: #eef2ff;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --code-bg: #1e293b;
      --exercise-bg: #fffbeb;
      --exercise-border: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .logo-text {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .course-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .progress-section { display: flex; flex-direction: column; gap: 6px; }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-text { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 500; }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* Module */
    .module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .module-header:hover { background: var(--sidebar-hover); }

    .module-arrow {
      width: 13px;
      height: 13px;
      color: rgba(255,255,255,0.25);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .module-item.open .module-arrow { transform: rotate(90deg); }

    .module-num {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .module-name {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      flex: 1;
      line-height: 1.35;
    }

    .module-count {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      padding: 2px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .module-lessons { display: none; padding-bottom: 2px; }
    .module-item.open .module-lessons { display: block; }

    /* Lesson item */
    .lesson-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 16px 7px 40px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }

    .lesson-item:hover { background: var(--sidebar-hover); }

    .lesson-item.active {
      background: rgba(99,102,241,0.1);
      border-left-color: var(--accent);
    }

    .lesson-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lesson-item.active .lesson-dot { border-color: var(--accent); background: var(--accent); }
    .lesson-item.completed .lesson-dot { border-color: #10b981; background: #10b981; }

    .dot-check { display: none; width: 8px; height: 8px; color: #fff; }
    .lesson-item.completed .dot-check { display: block; }

    .lesson-info { flex: 1; min-width: 0; }

    .lesson-num { font-size: 10px; color: rgba(255,255,255,0.2); font-weight: 600; margin-bottom: 1px; }
    .lesson-item.active .lesson-num { color: rgba(255,255,255,0.45); }

    .lesson-name {
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .lesson-item.active .lesson-name { color: rgba(255,255,255,0.88); font-weight: 500; }
    .lesson-item.completed .lesson-name { color: rgba(255,255,255,0.5); }

    /* ── MAIN ────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 40px;
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .breadcrumb-sep { color: var(--text-light); }
    .breadcrumb-current { color: var(--text); font-weight: 500; }

    .content-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px 100px;
    }

    .content-inner { max-width: 760px; }

    /* Lesson header */
    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .badge-module { background: var(--accent-light); color: #4338ca; }
    .badge-duration { background: #f0fdf4; color: #166534; }

    .lesson-title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 10px;
      color: var(--text);
    }

    .lesson-outcome {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .lesson-outcome::before {
      content: '';
      display: block;
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .lesson-description {
      font-size: 15px;
      line-height: 1.75;
      color: #334155;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 36px;
    }

    /* Concepts */
    .section-block { margin-bottom: 36px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .concepts-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .concept-tag {
      font-size: 12px;
      font-weight: 500;
      background: var(--accent-light);
      color: #4338ca;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Section heading */
    .section-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Theory cards */
    .theory-cards { display: flex; flex-direction: column; gap: 6px; }

    .theory-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .theory-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .theory-card-header:hover { background: #f8fafc; }

    .theory-card-title { font-size: 14px; font-weight: 600; color: var(--text); }

    .theory-arrow {
      width: 16px; height: 16px;
      color: var(--text-light);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .theory-card.open .theory-arrow { transform: rotate(180deg); }

    .theory-card-body {
      display: none;
      padding: 14px 18px 16px;
      font-size: 14px;
      line-height: 1.72;
      color: #334155;
      border-top: 1px solid var(--border);
    }

    .theory-card.open .theory-card-body { display: block; }

    /* Code examples */
    .example-block { margin-bottom: 14px; }

    .example-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f172a;
      padding: 10px 16px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }

    .example-title { font-size: 12px; font-weight: 500; color: #64748b; }

    .example-right { display: flex; align-items: center; gap: 8px; }

    .lang-badge {
      font-size: 11px;
      font-weight: 600;
      color: #818cf8;
      background: rgba(99,102,241,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .copy-btn {
      font-size: 11px;
      color: #475569;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.1); color: #cbd5e1; }
    .copy-btn.copied { color: #10b981; border-color: rgba(16,185,129,0.3); }

    .example-code {
      background: #1e293b;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: 16px 18px;
      overflow-x: auto;
    }

    .example-code pre {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.65;
      color: #e2e8f0;
      white-space: pre;
    }

    /* Exercise */
    .exercise-box {
      background: var(--exercise-bg);
      border: 1px solid #fde68a;
      border-left: 4px solid var(--exercise-border);
      border-radius: var(--radius-sm);
      padding: 20px 22px;
    }

    .exercise-title {
      font-size: 15px;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 12px;
    }

    .exercise-task {
      font-size: 14px;
      line-height: 1.72;
      color: #451a03;
      white-space: pre-line;
      margin-bottom: 14px;
    }

    .hints-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #b45309;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    .hints-toggle:hover { color: #92400e; }

    .hints-list {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .hints-list.visible { display: flex; }

    .hint-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      line-height: 1.55;
      color: #78350f;
    }

    .hint-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }

    /* Resources */
    .resources-list { display: flex; flex-direction: column; gap: 8px; }

    .resource-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: inherit;
      transition: all 0.15s;
    }

    .resource-link:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.07);
    }

    .resource-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .ri-docs { background: #eff6ff; }
    .ri-article { background: #f0fdf4; }
    .ri-video { background: #fef2f2; }

    .resource-info { flex: 1; min-width: 0; }
    .resource-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
    .resource-type { font-size: 11px; color: var(--text-light); font-weight: 500; text-transform: capitalize; }

    .resource-arrow { width: 15px; height: 15px; color: var(--text-light); flex-shrink: 0; }

    /* Complete button */
    .complete-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .complete-btn:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,0.3); }
    .complete-btn.done { background: #10b981; cursor: default; transform: none; box-shadow: none; }

    /* Coming soon */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 72px 40px;
    }

    .cs-icon { font-size: 52px; margin-bottom: 20px; }
    .cs-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .cs-sub { font-size: 14px; color: var(--text-muted); line-height: 1.65; max-width: 340px; margin-bottom: 28px; }

    .outcome-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      max-width: 380px;
      text-align: left;
    }

    .outcome-label { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-light); margin-bottom: 6px; }
    .outcome-text { font-size: 14px; color: #334155; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 10px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .nav-center { text-align: center; }
    .nav-counter { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
    .nav-next-title { font-size: 12px; font-weight: 500; color: var(--text-muted); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">EduSlop</span>
    </div>
    <div class="course-title">Multiagent Systems</div>
    <div class="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0 / 33 уроків</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <span>Курс</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">Обери урок</span>
    </div>
  </div>
  <div class="content-wrap">
    <div class="content-inner" id="content"></div>
  </div>
  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<script>
const CURRICULUM = {"title":"Multiagent Systems Curriculum","total_lessons":33,"estimated_hours_per_lesson":1.5,"total_hours":49.5,"modules":[{"id":1,"name":"Як працюють LLM","lesson_count":4,"lessons":[{"id":1,"topic":"Токени, контекстне вікно, температура","outcome":"Розумієш, як модель бачить текст","instruction":{"description":"Урок пояснює фундаментальні механізми LLM: як текст перетворюється на токени, які обмеження накладає контекстне вікно, і як параметри sampling впливають на результат. Без цього розуміння неможливо передбачувано керувати поведінкою моделі.","duration_minutes":90,"key_concepts":["token","tokenizer","context window","temperature","top_p","max_tokens"],"theory":[{"title":"Що таке токен","content":"Токен — це не символ і не слово, а субслово. Токенізатор (наприклад BPE — Byte Pair Encoding) розбиває текст на часті підрядки. Наприклад: 'unhappy' → ['un', 'happy'], 'ChatGPT' → ['Chat', 'G', 'PT']. Один токен ≈ 0.75 слова в англійському тексті, але в українській мові токенів зазвичай більше на те саме слово. Це важливо для розрахунку вартості та обмежень."},{"title":"Контекстне вікно","content":"Контекстне вікно — це максимальна кількість токенів, яку модель може обробити за один виклик: вхід (prompt) + вихід (completion) разом. Наприклад, Claude 3 Sonnet має вікно 200k токенів. Якщо текст перевищує ліміт, API поверне помилку або обріже вхід. Важливо: модель не 'пам'ятає' попередні виклики — кожен запит починається з нуля."},{"title":"Temperature та top_p","content":"Temperature (0.0–1.0) керує 'випадковістю' вибору наступного токена. При 0 — модель завжди обирає найімовірніший токен (детерміновано, підходить для коду/фактів). При 1 — більша варіативність (підходить для творчих задач). top_p (nucleus sampling) обмежує вибір: при top_p=0.9 модель розглядає лише ті токени, сукупна ймовірність яких ≤ 90%. Зазвичай змінюють або temperature, або top_p — не обидва одночасно."}],"examples":[{"title":"Підрахунок токенів через Anthropic SDK","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\nresponse = client.messages.count_tokens(\n    model=\"claude-sonnet-4-6\",\n    messages=[{\"role\": \"user\", \"content\": \"Привіт, як справи?\"}]\n)\nprint(response.input_tokens)  # наприклад: 12"},{"title":"Різниця між temperature=0 і temperature=1","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\nprompt = \"Назви одне місто в Україні.\"\n\nfor temp in [0, 1]:\n    response = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\",\n        max_tokens=20,\n        temperature=temp,\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    print(f\"temperature={temp}: {response.content[0].text}\")"}],"exercise":{"title":"Дослідження токенів та температури","task":"1. Візьми три тексти: короткий (5 слів), середній (50 слів) і довгий (200 слів). Підрахуй токени для кожного через API та обчисли співвідношення токен/слово.\n2. Запусти один і той самий промпт ('Напиши короткий вірш про осінь') 3 рази при temperature=0 і 3 рази при temperature=0.9. Порівняй результати всередині кожної групи.","hints":["Використовуй client.messages.count_tokens() для підрахунку без реального виклику моделі","Для порівняння результатів temperature=0 усі три відповіді мають бути ідентичними","Спробуй також украйні/технічний текст — кількість токенів на слово буде відрізнятись"]},"resources":[{"title":"Anthropic — Models overview (context windows)","type":"docs","url":"https://docs.anthropic.com/en/docs/about-claude/models"},{"title":"Tiktokenizer — інтерактивна візуалізація токенів","type":"article","url":"https://tiktokenizer.vercel.app"}]}},{"id":2,"topic":"Zero-shot, few-shot, chain-of-thought","outcome":"Пишеш ефективні базові промпти","instruction":{"description":"Урок розкриває три фундаментальні стратегії промптингу. Вибір між ними напряму впливає на якість відповіді без зміни моделі чи параметрів — це найдешевший спосіб покращити результат.","duration_minutes":90,"key_concepts":["zero-shot","few-shot","chain-of-thought","in-context learning","prompt pattern","CoT"],"theory":[{"title":"Zero-shot prompting","content":"Пряме завдання без прикладів. Підходить для простих задач, де модель вже добре навчена: переклад, підсумок, базова класифікація. Переваги: коротко, дешево за токенами. Недоліки: для нестандартних задач або специфічного формату результат непередбачуваний."},{"title":"Few-shot prompting","content":"До промпту додаються 2–5 прикладів формату «вхід → правильний вихід». Модель вловлює патерн і відтворює його для нового вхідного значення. Ключові правила: приклади мають бути різноманітними (не всі схожі), формат вхід/вихід — чітким і послідовним. Few-shot особливо ефективний для нестандартних форматів виводу або вузькодоменних завдань."},{"title":"Chain-of-thought (CoT)","content":"Фраза 'Думай покроково' або 'Let's think step by step' змушує модель явно виводити проміжні кроки міркування перед фінальною відповіддю. Це значно підвищує точність на задачах з математикою, логікою та багатокроковим плануванням. Причина: помилки накопичуються при 'стрибку' одразу до відповіді; явні кроки дозволяють моделі коригувати себе."}],"examples":[{"title":"Одна задача — три підходи","language":"text","code":"Задача: класифікувати відгук як позитивний / негативний / нейтральний.\n\n--- Zero-shot ---\nКласифікуй відгук: \"Доставка затрималась, але товар якісний.\"\n\n--- Few-shot ---\nКласифікуй відгуки:\n\"Все чудово, рекомендую!\" → позитивний\n\"Жахливий сервіс, більше не куплю.\" → негативний\n\"Отримав вчасно.\" → нейтральний\n\"Доставка затрималась, але товар якісний.\" →\n\n--- Chain-of-thought ---\nКласифікуй відгук, думаючи покроково:\n\"Доставка затрималась, але товар якісний.\"\nКрок 1: Чи є негативні аспекти?\nКрок 2: Чи є позитивні аспекти?\nКрок 3: Яке загальне враження?\nВідповідь:"}],"exercise":{"title":"Порівняння трьох стратегій на класифікації","task":"Обери задачу класифікації тексту (наприклад: визначення тональності або теми повідомлення). Підготуй 10 тестових прикладів. Запусти всі три стратегії промптингу та порівняй: кількість правильних відповідей, довжину промпту в токенах, час відповіді.","hints":["Використовуй temperature=0 для чистого порівняння без випадковості","Для few-shot обери приклади, що покривають різні класи рівномірно","CoT часто дає довшу відповідь — парси тільки фінальне слово/рядок"]},"resources":[{"title":"Wei et al. 2022 — Chain-of-Thought Prompting (оригінальна стаття)","type":"article","url":"https://arxiv.org/abs/2201.11903"},{"title":"Anthropic Prompt Library — готові приклади промптів","type":"docs","url":"https://docs.anthropic.com/en/prompt-library/library"}]}},{"id":3,"topic":"System prompts та рольове визначення","outcome":"Задаєш поведінку моделі через system","instruction":{"description":"System prompt — це невидимий для кінцевого користувача шар конфігурації, який визначає роль, обмеження та стиль моделі на весь діалог. Правильно написаний system prompt заощаджує токени в кожному user-повідомленні та робить поведінку моделі передбачуваною.","duration_minutes":90,"key_concepts":["system prompt","user turn","assistant turn","persona","constraint","instruction","Messages API"],"theory":[{"title":"Структура розмови в Messages API","content":"Кожен виклик Claude API складається з трьох ролей: system (необов'язковий, передається окремим полем), user (повідомлення людини), assistant (відповідь моделі). Система читає їх у порядку: спочатку system, потім почергово user/assistant. System prompt обробляється один раз для всього діалогу і задає загальний контекст."},{"title":"Що писати в system prompt","content":"Чотири ключові компоненти: (1) Роль/персона — 'Ти досвідчений Python-розробник'; (2) Контекст — де і навіщо використовується модель; (3) Обмеження — що модель НЕ повинна робити; (4) Формат відповіді — довжина, мова, структура (JSON, markdown тощо). Чим точніші інструкції, тим менше варіативності у відповідях."},{"title":"Антипатерни system prompt","content":"Три найпоширеніші помилки: (1) 'Звалище' — занадто багато несумісних інструкцій в одному блоці; краще декомпозувати; (2) Суперечливі обмеження — 'відповідай коротко' та 'давай вичерпні пояснення' одночасно; (3) Невизначені терміни — 'відповідай професійно' без конкретики; замість цього описуй конкретну поведінку."}],"examples":[{"title":"System prompt для tech-support бота","language":"text","code":"Ти — технічний асистент компанії SoftCorp. Відповідаєш ТІЛЬКИ на запитання щодо продуктів SoftCorp.\n\nПравила:\n- Відповідай українською мовою\n- Якщо питання не стосується SoftCorp — ввічливо відмов і поясни свою роль\n- Давай відповіді у форматі: Проблема → Причина → Рішення\n- Якщо не знаєш відповіді — скажи 'Я не маю цієї інформації' і запропонуй звернутись до підтримки"},{"title":"API виклик з system prompt (Python)","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\nresponse = client.messages.create(\n    model=\"claude-sonnet-4-6\",\n    max_tokens=300,\n    system=\"Ти — код-рев'юер. Відповідай ТІЛЬКИ на питання про якість коду. Формат: [Проблема], [Чому це погано], [Як виправити].\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"Переглянь цей код: for i in range(len(arr)): print(arr[i])\"}\n    ]\n)\nprint(response.content[0].text)"}],"exercise":{"title":"Написати system prompt для реального use case","task":"Обери один з варіантів: (а) юридичний асистент, що відповідає на питання про трудове право України; (б) код-рев'юер для Python; (в) вчитель математики для школярів 8 класу. Напиши system prompt, що включає всі 4 компоненти (роль, контекст, обмеження, формат). Протестуй на 5 різних запитах — в тому числі на 'поза темою' запит.","hints":["Починай з ролі у першому реченні — це задає тон всього промпту","Обмеження формулюй через конкретні дії, а не абстрактні якості","Протестуй edge case: що відбудеться якщо користувач попросить щось заборонене"]},"resources":[{"title":"Anthropic — System prompts guide","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/system-prompts"},{"title":"Anthropic — Prompt engineering overview","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview"}]}},{"id":4,"topic":"Tool use / Function calling","outcome":"Модель викликає зовнішні функції","instruction":{"description":"Tool use — це механізм, що перетворює LLM з генератора тексту на агента, здатного взаємодіяти із зовнішнім світом. Модель не виконує функції сама — вона повертає структурований JSON-запит, а виконання залишається на стороні програміста. Це основа побудови будь-якого агента.","duration_minutes":90,"key_concepts":["tool definition","input_schema","tool_use block","tool_result","parallel tool calls","agentic loop"],"theory":[{"title":"Як модель викликає інструмент","content":"Замість текстової відповіді модель може повернути блок типу tool_use: {id, name, input}. Це сигнал програмісту: 'виконай цю функцію з цими аргументами і поверни результат'. Модель не має прямого доступу до інструментів — весь I/O проходить через код розробника. Це принципово: безпека та контроль залишаються на стороні програми."},{"title":"Визначення інструменту","content":"Інструмент описується трьома полями: name (рядок-ідентифікатор), description (для моделі — пояснює коли і навіщо використовувати), input_schema (JSON Schema, що описує параметри). Якість description напряму впливає на те, чи модель правильно вибере інструмент. Правило: description має відповідати на питання 'коли треба викликати цей інструмент'."},{"title":"Цикл виконання tool use","content":"Повний цикл: (1) Запит користувача + визначення інструментів → API; (2) Модель повертає tool_use блок; (3) Код виконує функцію локально; (4) Результат передається назад як tool_result у наступному повідомленні; (5) Модель генерує фінальну відповідь користувачу. Якщо модель викликає кілька інструментів одночасно (parallel tool calls) — усі виконуються паралельно і результати передаються разом."},{"title":"Паралельні виклики інструментів","content":"Claude може вирішити викликати кілька інструментів в одній відповіді (наприклад, отримати погоду в Києві і Львові одночасно). У такому випадку відповідь містить масив tool_use блоків. Код має обробити всі виклики і повернути всі tool_result у наступному повідомленні. Це значно прискорює виконання порівняно з послідовними викликами."}],"examples":[{"title":"Визначення інструменту get_weather та повний цикл","language":"python","code":"import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\ntools = [\n    {\n        \"name\": \"get_weather\",\n        \"description\": \"Повертає поточну температуру для вказаного міста. Використовуй коли користувач питає про погоду.\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"city\": {\"type\": \"string\", \"description\": \"Назва міста\"}\n            },\n            \"required\": [\"city\"]\n        }\n    }\n]\n\ndef get_weather(city: str) -> str:\n    # У реальному коді тут був би API-запит\n    return json.dumps({\"city\": city, \"temperature\": 22, \"unit\": \"celsius\"})\n\n# Крок 1: перший запит\nresponse = client.messages.create(\n    model=\"claude-sonnet-4-6\",\n    max_tokens=300,\n    tools=tools,\n    messages=[{\"role\": \"user\", \"content\": \"Яка погода в Києві?\"}]\n)\n\n# Крок 2: обробка tool_use\ntool_results = []\nfor block in response.content:\n    if block.type == \"tool_use\":\n        result = get_weather(**block.input)\n        tool_results.append({\n            \"type\": \"tool_result\",\n            \"tool_use_id\": block.id,\n            \"content\": result\n        })\n\n# Крок 3: передати результати назад\nfinal = client.messages.create(\n    model=\"claude-sonnet-4-6\",\n    max_tokens=300,\n    tools=tools,\n    messages=[\n        {\"role\": \"user\", \"content\": \"Яка погода в Києві?\"},\n        {\"role\": \"assistant\", \"content\": response.content},\n        {\"role\": \"user\", \"content\": tool_results}\n    ]\n)\nprint(final.content[0].text)"}],"exercise":{"title":"Інструмент-калькулятор","task":"Створи інструмент calculate з операціями add, subtract, multiply, divide. Визначи JSON Schema для параметрів (operation, a, b). Реалізуй функцію-обробник. Протестуй на запитах: 'Скільки буде 15 помножити на 7?', 'Порахуй 100 ділити на 4 і відніми 8' (два виклики підряд).","hints":["У input_schema для operation використай enum: ['add', 'subtract', 'multiply', 'divide']","Перевір stop_reason у відповіді: якщо 'tool_use' — є виклик інструменту; якщо 'end_turn' — фінальна відповідь","Для двокрокового прикладу реалізуй цикл while stop_reason == 'tool_use'"]},"resources":[{"title":"Anthropic — Tool use guide","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use"},{"title":"Anthropic Cookbook — Tool use examples","type":"article","url":"https://github.com/anthropics/anthropic-cookbook/tree/main/tool_use"}]}}]},{"id":2,"name":"Один агент","lesson_count":4,"lessons":[{"id":5,"topic":"ReAct цикл: Thought → Action → Observation","outcome":"Розумієш внутрішній цикл агента","instruction":{"description":"ReAct — базовий архітектурний патерн агента: модель чергує міркування (Thought) і дії (Action), отримуючи спостереження (Observation). Без розуміння цього циклу неможливо передбачити, що агент робить всередині і де він може зупинитися.","duration_minutes":90,"key_concepts":["ReAct","Thought","Action","Observation","agentic loop","stop_reason","tool_use","end_turn"],"theory":[{"title":"Що таке ReAct","content":"ReAct = Reasoning + Acting. Агент не відповідає одразу — він спочатку міркує (Thought), потім обирає дію (Action), отримує результат (Observation) і знову міркує. Цей цикл повторюється до отримання фінальної відповіді. Ключова ідея: явне міркування перед кожною дією знижує кількість помилок порівняно з прямим викликом інструменту."},{"title":"Як це виглядає в Claude API","content":"Цикл на рівні API: (1) Відправляємо messages + tools; (2) Якщо stop_reason='tool_use' — модель хоче викликати інструмент; (3) Виконуємо інструмент локально; (4) Додаємо tool_result до messages і відправляємо знову; (5) Якщо stop_reason='end_turn' — агент завершив роботу. Кожна ітерація — це новий API-запит з повною історією."},{"title":"Умова завершення та захист","content":"Агент завершує роботу коли: (а) stop_reason='end_turn' — модель вирішила, що відповідь готова; (б) досягнуто max_tokens у відповіді. Обов'язково додавай власний лічильник ітерацій (max_iterations=10) — без нього агент може зациклитись і витратити весь бюджет токенів."}],"examples":[{"title":"Базовий ReAct цикл","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\ndef run_react_agent(user_message, tools, tool_handlers, max_iter=10):\n    messages = [{\"role\": \"user\", \"content\": user_message}]\n    \n    for step in range(max_iter):\n        response = client.messages.create(\n            model=\"claude-sonnet-4-6\",\n            max_tokens=1024,\n            tools=tools,\n            messages=messages\n        )\n        \n        print(f\"--- Крок {step + 1} | stop_reason: {response.stop_reason} ---\")\n        \n        # Додаємо відповідь асистента до історії\n        messages.append({\"role\": \"assistant\", \"content\": response.content})\n        \n        if response.stop_reason == \"end_turn\":\n            # Агент завершив — повертаємо текстову відповідь\n            for block in response.content:\n                if hasattr(block, 'text'):\n                    return block.text\n        \n        if response.stop_reason == \"tool_use\":\n            tool_results = []\n            for block in response.content:\n                if block.type == \"tool_use\":\n                    print(f\"  Action: {block.name}({block.input})\")\n                    result = tool_handlers[block.name](**block.input)\n                    print(f\"  Observation: {result}\")\n                    tool_results.append({\n                        \"type\": \"tool_result\",\n                        \"tool_use_id\": block.id,\n                        \"content\": str(result)\n                    })\n            messages.append({\"role\": \"user\", \"content\": tool_results})\n    \n    return \"Перевищено максимальну кількість ітерацій\""}],"exercise":{"title":"Відстеження ReAct циклу в лозі","task":"1. Реалізуй два простих інструменти: get_current_time() → повертає поточний час, get_random_number(min, max) → повертає випадкове число.\n2. Запусти агента з запитом 'Яка зараз година і назви мені випадкове число від 1 до 100?'\n3. Виводь кожен крок циклу: номер ітерації, stop_reason, назву інструменту та результат.\n4. Переконайся що агент завершує роботу за 2–3 ітерації.","hints":["Використовуй функцію run_react_agent з прикладу як основу","get_current_time не приймає параметрів — в input_schema встанови properties: {}","Порахуй загальну кількість токенів через response.usage для обох викликів"]},"resources":[{"title":"Yao et al. 2022 — ReAct: Synergizing Reasoning and Acting (оригінальна стаття)","type":"article","url":"https://arxiv.org/abs/2210.03629"},{"title":"Anthropic — Agentic and tool use patterns","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use/overview"}]}},{"id":6,"topic":"Перший агент з інструментами (Python/JS)","outcome":"Запускаєш живого агента","instruction":{"description":"Практичний урок: з нуля будуємо повноцінного агента у вигляді Python-класу. Фокус на правильній структурі коду — реєстр інструментів, збереження історії, захист від зациклення.","duration_minutes":90,"key_concepts":["agent class","tool registry","message history","max_iterations","run loop","async agent"],"theory":[{"title":"Структура коду агента","content":"Добре структурований агент має чотири компоненти: (1) Ініціалізація — список інструментів, system prompt, параметри; (2) Цикл виконання (run loop) — основний while/for; (3) Обробник інструментів (tool dispatcher) — маппінг name → функція; (4) Фінальна відповідь — що повертається користувачу. Розділення цих частин спрощує тестування і налагодження."},{"title":"Message history: чому потрібно зберігати все","content":"Claude API stateless — кожен виклик не пам'ятає попередніх. Тому агент зобов'язаний передавати ВСЮ історію messages при кожному запиті: і user-повідомлення, і assistant-відповіді, і tool_results. Якщо обрізати історію — агент забуде що вже зробив і може повторити кроки або дати суперечливу відповідь."},{"title":"Захист від нескінченних циклів","content":"max_iterations — обов'язковий параметр. Встановлюй реалістичне значення (5–15) залежно від складності задачі. Крім ліміту ітерацій, варто обмежувати загальний бюджет токенів (наприклад, 50k input tokens на сесію). При досягненні ліміту поверни часткову відповідь або повідомлення про помилку — ніколи не роби silent fail."}],"examples":[{"title":"Клас SimpleAgent (Python)","language":"python","code":"import anthropic\nfrom typing import Callable\n\nclass SimpleAgent:\n    def __init__(self, tools: list, handlers: dict[str, Callable], system: str = \"\", max_iter: int = 10):\n        self.client = anthropic.Anthropic()\n        self.tools = tools\n        self.handlers = handlers  # {\"tool_name\": handler_fn}\n        self.system = system\n        self.max_iter = max_iter\n    \n    def run(self, user_message: str) -> str:\n        messages = [{\"role\": \"user\", \"content\": user_message}]\n        \n        for _ in range(self.max_iter):\n            kwargs = {\"model\": \"claude-sonnet-4-6\", \"max_tokens\": 1024,\n                      \"tools\": self.tools, \"messages\": messages}\n            if self.system:\n                kwargs[\"system\"] = self.system\n            \n            response = self.client.messages.create(**kwargs)\n            messages.append({\"role\": \"assistant\", \"content\": response.content})\n            \n            if response.stop_reason == \"end_turn\":\n                return next((b.text for b in response.content if hasattr(b, 'text')), \"\")\n            \n            tool_results = []\n            for block in response.content:\n                if block.type == \"tool_use\":\n                    fn = self.handlers.get(block.name)\n                    result = fn(**block.input) if fn else f\"Unknown tool: {block.name}\"\n                    tool_results.append({\"type\": \"tool_result\",\n                                         \"tool_use_id\": block.id, \"content\": str(result)})\n            messages.append({\"role\": \"user\", \"content\": tool_results})\n        \n        return \"Ліміт ітерацій досягнуто\"\n\n\n# Використання:\ntools = [{\n    \"name\": \"search\",\n    \"description\": \"Шукає інформацію за запитом\",\n    \"input_schema\": {\"type\": \"object\",\n                     \"properties\": {\"query\": {\"type\": \"string\"}},\n                     \"required\": [\"query\"]}\n}]\n\ndef mock_search(query: str) -> str:\n    return f\"Результати для '{query}': [стаття 1, стаття 2, стаття 3]\"\n\nagent = SimpleAgent(tools=tools, handlers={\"search\": mock_search},\n                    system=\"Ти дослідницький асистент.\")\nprint(agent.run(\"Що таке нейронні мережі?\"))"}],"exercise":{"title":"Агент з двома інструментами","task":"Побудуй агента на основі класу SimpleAgent з двома mock-інструментами:\n- search_wikipedia(topic) → повертає рядок з коротким описом теми (придумай відповідь)\n- get_page_length(topic) → повертає кількість символів на сторінці (random int 1000–50000)\n\nЗапусти агента на трьох різних запитах і переконайся що:\n1. Агент використовує обидва інструменти коли доречно\n2. История messages зберігається коректно між ітераціями\n3. Агент не виходить за межі max_iter","hints":["Додай print(f'Iteration {i}, messages count: {len(messages)}') в цикл для моніторингу","Перевір що handler отримує саме ті аргументи які передала модель (block.input)","Спробуй max_iter=2 щоб побачити як агент реагує на ліміт ітерацій"]},"resources":[{"title":"Anthropic Cookbook — basic agent implementation","type":"article","url":"https://github.com/anthropics/anthropic-cookbook/blob/main/tool_use/creating_agents.ipynb"},{"title":"Anthropic — Building effective agents","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}},{"id":7,"topic":"In-context state: пам'ять всередині одного запуску","outcome":"Агент пам'ятає кроки в межах сесії","instruction":{"description":"Агент 'пам'ятає' в межах одного запуску завдяки message history. Урок пояснює як правильно будувати цю пам'ять, що в ній зберігати і як стискати щоб не переповнити контекстне вікно.","duration_minutes":90,"key_concepts":["message history","conversation state","context compression","sliding window","summarization","scratchpad"],"theory":[{"title":"Як працює пам'ять агента","content":"Вся пам'ять агента — це список messages. Кожен виклик API отримує цю копію заново і відповідає на основі всього контексту. Це значить: якщо агент записав щось у tool_result на кроці 3, він 'пам'ятає' це на кроці 7 — але лише тому, що ми передали повну messages. Без цього передавання кожен крок — tabula rasa."},{"title":"Проблема переповнення контексту","content":"Довгі сесії (багато ітерацій з великими tool_result) можуть перевищити контекстне вікно. Три стратегії: (1) Sliding window — зберігаємо тільки останні N повідомлень; (2) Summarization — стискаємо старі повідомлення через окремий API call; (3) External state — виносимо великі дані (HTML сторінок, файли) за межі messages і тримаємо лише metadata."},{"title":"Scratchpad та intermediate results","content":"Крім messages, агент може підтримувати власний словник стану — scratchpad. Наприклад: знайдені URL, частково оброблені дані, лічильники. Цей стан передається або через system prompt (невеликий), або через окремий інструмент read_scratchpad/write_scratchpad. Перевага: scratchpad структурований і не залежить від формату LLM-відповіді."}],"examples":[{"title":"Стиснення історії через summarize","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\nMAX_MESSAGES = 20  # зберігаємо не більше 20 повідомлень\n\ndef compress_history(messages: list, keep_last: int = 6) -> list:\n    \"\"\"Стискає старі повідомлення в одне summary.\"\"\"\n    if len(messages) <= keep_last:\n        return messages\n    \n    old_messages = messages[:-keep_last]\n    recent_messages = messages[-keep_last:]\n    \n    # Просимо модель підсумувати старі кроки\n    summary_resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\",\n        max_tokens=300,\n        system=\"Стисни нижчезазначену розмову в 2-3 речення, зберігши ключові факти.\",\n        messages=[{\"role\": \"user\", \"content\": str(old_messages)}]\n    )\n    summary = summary_resp.content[0].text\n    \n    # Замінюємо стару історію на summary\n    compressed = [{\"role\": \"user\", \"content\": f\"[Попередній контекст]: {summary}\"}]\n    return compressed + recent_messages\n\n\n# Приклад агента з автоматичним стисненням:\ndef run_with_compression(user_message, tools, handlers, max_iter=10):\n    messages = [{\"role\": \"user\", \"content\": user_message}]\n    \n    for i in range(max_iter):\n        if len(messages) > MAX_MESSAGES:\n            messages = compress_history(messages)\n            print(f\"Compressed to {len(messages)} messages\")\n        \n        response = client.messages.create(\n            model=\"claude-sonnet-4-6\", max_tokens=1024,\n            tools=tools, messages=messages\n        )\n        messages.append({\"role\": \"assistant\", \"content\": response.content})\n        \n        if response.stop_reason == \"end_turn\":\n            return next((b.text for b in response.content if hasattr(b, 'text')), \"\")\n        \n        tool_results = []\n        for block in response.content:\n            if block.type == \"tool_use\" and block.name in handlers:\n                result = handlers[block.name](**block.input)\n                tool_results.append({\"type\": \"tool_result\",\n                                     \"tool_use_id\": block.id, \"content\": str(result)})\n        messages.append({\"role\": \"user\", \"content\": tool_results})\n    \n    return \"Ліміт досягнуто\""}],"exercise":{"title":"Агент-нотатник зі збереженням стану","task":"Побудуй агента-нотатника з трьома інструментами:\n- add_note(text) → додає нотатку до списку, повертає 'Збережено'\n- list_notes() → повертає всі збережені нотатки\n- clear_notes() → очищує список\n\nЗапусти сесію з 5+ кроками:\n1. 'Запам'ятай що я хочу купити молоко'\n2. 'Також додай яйця до списку'\n3. 'Що у моєму списку?'\n4. 'Очисти список і додай хліб'\n5. 'Покажи фінальний список'\n\nПеревір що нотатки зберігаються між кроками (стан нотатника — поза messages, у Python змінній).","hints":["Зберігай notes як Python список поза класом агента — інструменти матимуть до нього доступ через closure або global","Переконайся що list_notes() повертає рядок, а не Python list — інакше tool_result буде некоректним","Виводь len(messages) після кожного кроку щоб відстежувати ріст контексту"]},"resources":[{"title":"Anthropic — Long context best practices","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/context-windows"},{"title":"Anthropic — Agentic memory patterns","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}},{"id":8,"topic":"Дебаг агентів: чому вони застрягають","outcome":"Діагностуєш і виправляєш помилки","instruction":{"description":"Агенти зупиняються і роблять помилки передбачуваними способами. Цей урок — карта найчастіших збоїв і практичні інструменти для їх діагностики та виправлення ще в розробці.","duration_minutes":90,"key_concepts":["infinite loop","hallucinated tool call","invalid arguments","retry logic","trace decorator","graceful degradation","guardrails"],"theory":[{"title":"Типи збоїв агента","content":"Чотири найпоширеніші збої: (1) Нескінченний цикл — агент повторює один і той самий інструмент без прогресу (зазвичай бо tool_result не відповідає очікуванню); (2) Галюцинований виклик — агент намагається викликати інструмент якого не існує або передає параметри невірного типу; (3) Зациклення на помилці — інструмент повертає помилку, агент знов намагається те саме; (4) Context confusion — при довгій сесії агент 'забуває' початкову задачу і відповідає на щось інше."},{"title":"Трасування: як бачити що відбувається","content":"Без трасування дебаг агента — це гадання. Логуй мінімум: (а) кожен виклик інструменту (name + input); (б) кожен tool_result (перші 200 символів); (в) stop_reason кожної ітерації; (г) кількість токенів (usage.input_tokens). Ці дані дають повну картину виконання і дозволяють відтворити будь-який збій детерміновано при temperature=0."},{"title":"Retry та graceful degradation","content":"При тимчасових помилках (API rate limit, network timeout) використовуй exponential backoff: чекати 1s, потім 2s, 4s, 8s. При перевищенні max_iterations не роби silent fail — поверни часткову відповідь з позначкою 'неповний результат'. При галюцинованому виклику повертай структурований error у tool_result (не кидай виняток) — це дозволяє агенту самостійно відкоригуватися."}],"examples":[{"title":"Декоратор трасування агента","language":"python","code":"import functools\nimport time\nfrom typing import Callable\n\ndef trace_tool(fn: Callable) -> Callable:\n    \"\"\"Декоратор що логує виклики інструментів.\"\"\"\n    @functools.wraps(fn)\n    def wrapper(**kwargs):\n        start = time.time()\n        print(f\"  → {fn.__name__}({kwargs})\")\n        try:\n            result = fn(**kwargs)\n            elapsed = (time.time() - start) * 1000\n            print(f\"  ← {fn.__name__} [{elapsed:.0f}ms]: {str(result)[:100]}\")\n            return result\n        except Exception as e:\n            print(f\"  ✗ {fn.__name__} ERROR: {e}\")\n            return f\"ERROR: {e}\"  # повертаємо помилку як рядок, не кидаємо виняток\n    return wrapper\n\n\ndef safe_agent_run(agent_fn, user_message, max_retries=3):\n    \"\"\"Запускає агента з retry при API помилках.\"\"\"\n    for attempt in range(max_retries):\n        try:\n            return agent_fn(user_message)\n        except Exception as e:\n            if \"rate_limit\" in str(e).lower() and attempt < max_retries - 1:\n                wait = 2 ** attempt  # 1s, 2s, 4s\n                print(f\"Rate limit, чекаємо {wait}s...\")\n                time.sleep(wait)\n            else:\n                return f\"Помилка після {attempt + 1} спроб: {e}\"\n\n\n# Приклад використання:\n@trace_tool\ndef search(query: str) -> str:\n    # Симулюємо помилку для демонстрації\n    if \"error\" in query.lower():\n        raise ValueError(\"Search service unavailable\")\n    return f\"Results for: {query}\"\n\n# Тепер search логує кожен виклик і безпечно обробляє помилки"}],"exercise":{"title":"Навмисний збій та діагностика","task":"1. Візьми агента з уроку 6 (SimpleAgent).\n2. Додай декоратор @trace_tool до всіх інструментів.\n3. Навмисно спричини кожен тип збою і зафіксуй що відбувається:\n   а) Видали один інструмент з handlers (але залиш в tools) — що поверне агент?\n   б) Встанови max_iter=2 для складного запиту — як агент завершує роботу?\n   в) Зроби так щоб інструмент кидав виняток — чи агент відновлюється?\n4. Для кожного збою реалізуй виправлення.","hints":["Для кейсу (а) повертай 'Tool not found' рядок замість виклику fn — це дасть агенту шанс відкоригуватись","Зберігай logs у список і виводь повний trace після завершення — легше аналізувати","При max_iter=2 перевір чи відповідь містить позначку про неповний результат"]},"resources":[{"title":"Anthropic — Error handling in tool use","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use/implement-tool-use#handling-tool-use-and-tool-result-content-blocks"},{"title":"LangSmith — tracing and observability intro","type":"article","url":"https://docs.smith.langchain.com/concepts/tracing"}]}}]},{"id":3,"name":"Навіщо мультиагентність","lesson_count":3,"lessons":[{"id":9,"topic":"Обмеження одного агента та use cases для систем","outcome":"Розумієш, коли потрібні кілька агентів","instruction":{"description":"Один агент потужний, але обмежений: контекстне вікно, послідовність виконання та відсутність спеціалізації ставлять природні межі. Цей урок аналізує де ці обмеження стають критичними і які класи задач природно вимагають кількох агентів. Розуміння цих меж — перший крок до правильного архітектурного рішення.","duration_minutes":90,"key_concepts":["context overflow","serial bottleneck","specialization","long-horizon task","parallel subtask","agent decomposition","fan-out"],"theory":[{"title":"Три стелі одного агента","content":"Один агент стикається з трьома фізичними обмеженнями: (1) Контекстне переповнення — задача потребує більше даних ніж вміщує вікно; (2) Послідовний вузол — підзадачі можна виконати паралельно, але агент йде крок за кроком; (3) Відсутність глибокої спеціалізації — один агент з generic промптом не замінить двох агентів з вузькими ролями (юрист + кодер). Ці межі не баги — це архітектурні сигнали."},{"title":"Класи задач для мультиагентних систем","content":"Мультиагентна система виправдана коли є хоча б одна з умов: незалежні підзадачі (можна паралелізувати), потрібна спеціалізація (різні ролі), обсяг даних перевищує одне контекстне вікно, або потрібна взаємна перевірка (один агент генерує, другий критикує). Типові use cases: дослідження з багатьох джерел, паралельний аналіз документів, peer-review між агентами, довгі пайплайни обробки."},{"title":"Коли НЕ потрібна мультиагентність","content":"Якщо задача вміщується в одне контекстне вікно і є лінійною — один агент дешевший, простіший і легший для налагодження. Мультиагентність додає latency мережевих викликів, складність оркестрації та нові точки відмови. Правило: починай з одного агента і ускладнюй лише тоді, коли впираєшся в конкретне обмеження, а не 'про всяк випадок'."}],"examples":[{"title":"Виявлення ліміту одного агента на великому документі","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\ndef single_agent_analyze(documents: list[str]) -> str:\n    combined = \" [---] \".join(documents)\n    tokens = client.messages.count_tokens(\n        model=\"claude-sonnet-4-6\",\n        messages=[{\"role\": \"user\", \"content\": combined}]\n    )\n    print(f\"Токенів: {tokens.input_tokens}\")\n    if tokens.input_tokens > 180_000:\n        print(\"Ліміт перевищено — використовуємо декомпозицію\")\n        return split_and_delegate(documents)\n    response = client.messages.create(\n        model=\"claude-sonnet-4-6\",\n        max_tokens=500,\n        messages=[{\"role\": \"user\", \"content\": \"Проаналізуй: \" + combined}]\n    )\n    return response.content[0].text\n\ndef split_and_delegate(documents: list[str]) -> str:\n    summaries = []\n    for i, doc in enumerate(documents):\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-6\",\n            max_tokens=200,\n            messages=[{\"role\": \"user\", \"content\": \"Стисни ключові факти: \" + doc}]\n        )\n        summaries.append(resp.content[0].text)\n        print(f\"  Документ {i+1} оброблено\")\n    final = client.messages.create(\n        model=\"claude-sonnet-4-6\",\n        max_tokens=400,\n        messages=[{\"role\": \"user\", \"content\": \"Об'єднай висновки: \" + \" | \".join(summaries)}]\n    )\n    return final.content[0].text\n\ndocs = [\"Стаття 1 \" * 500, \"Стаття 2 \" * 500]\nprint(single_agent_analyze(docs))"}],"exercise":{"title":"Діагностика обмежень та декомпозиція задачі","task":"1. Визнач три реальні задачі (наприклад: аналіз 20 статей, переклад + вичитка + форматування, юридична перевірка + технічна перевірка).\n2. Для кожної задачі заповни таблицю: чи перевищує дані ліміт контексту? Чи є паралельні підзадачі? Чи потрібна спеціалізація?\n3. На основі таблиці: яка задача найбільше виграє від мультиагентності?\n4. Намалюй (або опиши текстом) схему мультиагентної системи для обраної задачі: які агенти, як вони взаємодіють.","hints":["Використовуй client.messages.count_tokens() щоб реально виміряти розмір своїх даних перед декомпозицією","Підзадачі вважаються паралельними якщо результат A не потрібен для запуску B","Спеціалізація виправдана коли для підзадачі потрібен окремий system prompt або набір інструментів"]},"resources":[{"title":"Anthropic — Building effective agents","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"arXiv — A Survey on LLM-based Multi-Agent Systems","type":"article","url":"https://arxiv.org/abs/2402.01680"}]}},{"id":10,"topic":"Паралельне vs. послідовне виконання","outcome":"Обираєш підхід під задачу","instruction":{"description":"Вибір між паралельним і послідовним виконанням — одне з ключових архітектурних рішень мультиагентної системи. Паралельність зменшує загальний час виконання, але потребує незалежних підзадач. Послідовність гарантує що кожен агент базується на результатах попереднього.","duration_minutes":90,"key_concepts":["fan-out","pipeline","asyncio","dependency graph","latency","throughput","gather","sequential chain"],"theory":[{"title":"Послідовний пайплайн","content":"Агенти виконуються один за одним: A → B → C, де кожен отримує результат попереднього. Підходить коли є логічна залежність між кроками: агент-дослідник збирає факти → агент-аналітик їх інтерпретує → агент-автор пише текст. Переваги: простота, детермінованість, легкість відладки. Недолік: загальний час = сума часів кожного кроку."},{"title":"Паралельний fan-out","content":"Якщо підзадачі незалежні, їх можна запустити одночасно через asyncio.gather(). Загальний час ≈ max(час найдовшого агента), а не сума. Наприклад: аналізувати 5 ринків одночасно замість послідовно. Критична вимога: агенти не повинні залежати один від одного всередині паралельного блоку. Якщо залежність є — це sequential, не parallel."},{"title":"Гібридна архітектура та граф залежностей","content":"Реальні системи комбінують обидва підходи. Малюй граф залежностей: якщо між двома вузлами є стрілка (B потребує результату A) — sequential; якщо стрілок немає — parallel. Типова гібридна схема: паралельний збір даних з кількох джерел (fan-out) → послідовна агрегація та синтез (pipeline). Розподіл роботи на незалежні блоки — головне архітектурне завдання."}],"examples":[{"title":"Порівняння sequential vs parallel через asyncio","language":"python","code":"import asyncio\nimport anthropic\nimport time\n\nclient = anthropic.Anthropic()\n\nasync def analyze_topic(topic: str) -> str:\n    loop = asyncio.get_event_loop()\n    response = await loop.run_in_executor(\n        None,\n        lambda: client.messages.create(\n            model=\"claude-sonnet-4-6\",\n            max_tokens=200,\n            messages=[{\"role\": \"user\", \"content\": \"Коротко проаналізуй: \" + topic}]\n        )\n    )\n    return response.content[0].text\n\nasync def run_sequential(topics: list[str]) -> list[str]:\n    results = []\n    for topic in topics:\n        result = await analyze_topic(topic)\n        results.append(result)\n        print(f\"  seq: {topic}\")\n    return results\n\nasync def run_parallel(topics: list[str]) -> list[str]:\n    print(f\"  par: {len(topics)} агентів одночасно...\")\n    return await asyncio.gather(*[analyze_topic(t) for t in topics])\n\ntopics = [\"AI в медицині\", \"AI в освіті\", \"AI в фінансах\"]\n\nstart = time.time()\nseq = asyncio.run(run_sequential(topics))\nprint(f\"Sequential: {time.time() - start:.1f}s\")\n\nstart = time.time()\npar = asyncio.run(run_parallel(topics))\nprint(f\"Parallel: {time.time() - start:.1f}s\")"}],"exercise":{"title":"Порівняння підходів на реальній задачі","task":"1. Обери задачу з кількома підзадачами: проаналізуй 4 різні компанії (Tesla, Apple, Google, Amazon) — їх ринкову позицію та технологічні проекти.\n2. Реалізуй sequential версію: аналізуй одну компанію за раз, результати акумулюй у список.\n3. Реалізуй parallel версію через asyncio.gather() — всі 4 компанії одночасно.\n4. Виміряй час виконання обох версій через time.time(). Порівняй результати — чи відрізняється якість відповідей?","hints":["asyncio.run_in_executor(None, lambda: ...) дозволяє викликати синхронний anthropic client у async контексті без блокування event loop","Додай print перед і після asyncio.gather щоб переконатись що агенти стартують одночасно","Для справедливого порівняння використовуй однаковий промпт і temperature=0 в обох версіях"]},"resources":[{"title":"Python asyncio — Running Tasks Concurrently","type":"docs","url":"https://docs.python.org/3/library/asyncio-task.html#running-tasks-concurrently"},{"title":"Anthropic — Parallelization pattern","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}},{"id":11,"topic":"Передача контексту між агентами","outcome":"Проектуєш handoff між агентами","instruction":{"description":"Коли один агент завершує роботу і передає результати іншому — потрібен чіткий контракт: що передається, в якому форматі, і який мінімум інформації достатній. Погано спроектований handoff — найчастіша причина 'зламаного телефону' між агентами.","duration_minutes":90,"key_concepts":["handoff","context object","orchestrator","message passing","agent interface","structured output","minimal context","dataclass"],"theory":[{"title":"Проблема 'зламаного телефону'","content":"Якщо агент A передає сирий текстовий блок агенту B, той може неправильно інтерпретувати результати, пропустити важливі деталі або продублювати роботу. Структурований контекст-об'єкт (dataclass або JSON схема) усуває цю проблему: отримувач точно знає що де знаходиться. Аналогія: передати колезі Excel-таблицю vs. надіслати скан паперу."},{"title":"Мінімальний достатній контекст","content":"Не передавай всю message history від попереднього агента — це заповнює контекстне вікно і плутає наступного агента сторонніми деталями. Передавай лише: (1) результат (що знайдено або зроблено), (2) статус (успіх / часткові дані / помилка), (3) metadata (джерела, confidence, обмеження). Принцип: наступний агент повинен отримати рівно стільки, скільки потрібно для якісного продовження."},{"title":"Оркестратор як медіатор handoff","content":"Замість прямої передачі A→B, оркестратор отримує результат від A, трансформує його у формат який очікує B, і передає далі. Це дозволяє агентам залишатися незалежними — вони не знають один про одного, лише про свій вхідний контракт. Якщо формат виходу A змінюється — оновлюється лише оркестратор, а не всі наступні агенти."}],"examples":[{"title":"Структурований handoff через dataclass","language":"python","code":"import anthropic\nfrom dataclasses import dataclass\n\n@dataclass\nclass AgentResult:\n    agent_name: str\n    output: str\n    sources: list[str]\n    confidence: str  # \"high\" | \"medium\" | \"low\"\n    error: str | None = None\n\nclient = anthropic.Anthropic()\n\ndef research_agent(topic: str) -> AgentResult:\n    response = client.messages.create(\n        model=\"claude-sonnet-4-6\",\n        max_tokens=300,\n        system=\"Ти дослідник. Знаходь факти та вказуй ключові тези.\",\n        messages=[{\"role\": \"user\", \"content\": \"Досліди тему: \" + topic}]\n    )\n    return AgentResult(\n        agent_name=\"researcher\",\n        output=response.content[0].text,\n        sources=[\"wikipedia.org\", \"arxiv.org\"],\n        confidence=\"medium\"\n    )\n\ndef writer_agent(research: AgentResult) -> str:\n    if research.error:\n        return \"Помилка: \" + research.error\n    # Мінімальний контекст — без зайвої history\n    context = \"Результат дослідження: \" + research.output\n    response = client.messages.create(\n        model=\"claude-sonnet-4-6\",\n        max_tokens=400,\n        system=\"Ти автор. Пиши зрозумілі та структуровані статті.\",\n        messages=[{\"role\": \"user\", \"content\": context}]\n    )\n    return response.content[0].text\n\n# Оркестратор керує handoff між агентами:\nresearch = research_agent(\"квантові обчислення\")\nprint(f\"Завершено: confidence={research.confidence}\")\narticle = writer_agent(research)\nprint(article)"}],"exercise":{"title":"Тривузловий пайплайн з контрактами","task":"Побудуй пайплайн із трьох агентів: Researcher → FactChecker → Writer.\n1. Визнач dataclass HandoffData з полями: output (str), is_verified (bool), key_facts (list[str]), confidence (str).\n2. Researcher заповнює output і key_facts.\n3. FactChecker перевіряє кожен факт (mock: позначай як вірний/невірний), встановлює is_verified і оновлює confidence.\n4. Writer отримує лише HandoffData і пише фінальний текст з позначкою '⚠ Неперевірено' якщо is_verified=False.\n5. Протестуй на темі 'Переваги мультиагентних систем'.","hints":["HandoffData.key_facts — список рядків, а не суцільний текст: FactChecker може перебирати факти поіменно","Writer не повинен знати про FactChecker — він отримує лише HandoffData і діє згідно контракту","Додай print на кожному handoff щоб бачити яка інформація передається між агентами"]},"resources":[{"title":"Anthropic — Multi-agent network patterns","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use/orchestration"},{"title":"Anthropic — Building effective agents (Agents as orchestrators)","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}}]},{"id":4,"name":"Патерни координації","lesson_count":5,"lessons":[{"id":12,"topic":"Orchestrator + Subagents","outcome":"Центральний агент делегує підзадачі","instruction":{"description":"Orchestrator + Subagents — найпоширеніший патерн мультиагентних систем: центральний агент-оркестратор аналізує задачу, розбиває її на підзадачі та делегує спеціалізованим субагентам. Урок пояснює як правильно проектувати оркестратор, визначати межі відповідальності і збирати результати субагентів в єдину відповідь.","duration_minutes":90,"key_concepts":["orchestrator","subagent","delegation","task decomposition","result aggregation","specialization","tool dispatch"],"theory":[{"title":"Роль оркестратора","content":"Оркестратор — це агент-диригент: він отримує задачу від користувача, вирішує як її розбити, викликає потрібних субагентів і зводить результати в єдину відповідь. Оркестратор НЕ виконує підзадачі сам — він лише координує. Це розділення між 'хто вирішує що робити' і 'хто це робить' — ключовий принцип патерну."},{"title":"Субагенти як спеціалізовані виконавці","content":"Кожен субагент має вузьку спеціалізацію: агент-пошуковик, агент-аналітик, агент-редактор. Спеціалізація досягається через окремий system prompt, власний набір інструментів і обмежений контекст (лише те, що потрібно для підзадачі). Субагент не знає про інших субагентів — він отримує задачу від оркестратора і повертає результат."},{"title":"Агрегація результатів","content":"Після завершення субагентів оркестратор збирає їхні результати. Стратегії агрегації: конкатенація (об'єднати тексти), вибір кращого (взяти найрелевантніший результат), синтез (попросити ще один агент звести висновки). Важливо: оркестратор повинен перевіряти що субагент повернув результат, а не помилку, перш ніж передавати далі."}],"examples":[{"title":"Оркестратор із двома субагентами (дослідник + автор)","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\ndef run_subagent(system: str, task: str, max_tokens: int = 400) -> str:\n    response = client.messages.create(\n        model=\"claude-sonnet-4-6\",\n        max_tokens=max_tokens,\n        system=system,\n        messages=[{\"role\": \"user\", \"content\": task}]\n    )\n    return response.content[0].text\n\ndef orchestrator(user_request: str) -> str:\n    print(f\"[Orchestrator] Задача: {user_request}\")\n\n    # Субагент 1: дослідник\n    research = run_subagent(\n        system=\"Ти дослідник. Знаходь факти та ключові тези по темі.\",\n        task=\"Досліди: \" + user_request\n    )\n    print(f\"[Researcher] Завершено: {len(research)} символів\")\n\n    # Субагент 2: автор\n    article = run_subagent(\n        system=\"Ти автор. Пиши зрозумілі статті на основі досліджень.\",\n        task=\"Напиши статтю на основі цих досліджень: \" + research\n    )\n    print(f\"[Writer] Завершено: {len(article)} символів\")\n\n    return article\n\nresult = orchestrator(\"переваги мультиагентних систем\")\nprint(result)"}],"exercise":{"title":"Оркестратор з трьома субагентами","task":"Побудуй оркестратора для підготовки навчального матеріалу:\n1. Субагент-дослідник: збирає факти по темі (system prompt: 'Ти дослідник...')\n2. Субагент-структуризатор: розбиває матеріал на розділи (system prompt: 'Ти редактор...')\n3. Субагент-спрощувач: перекладає на просту мову для початківців\nОркестратор послідовно викликає усіх трьох і виводить фінальний матеріал.\nПротестуй на темі 'Як працює векторний пошук'.","hints":["Кожен субагент — це окремий виклик client.messages.create() зі своїм system prompt","Передавай результат попереднього субагента як task для наступного — це послідовна делегація","Додай print між субагентами щоб бачити прогрес оркестрації"]},"resources":[{"title":"Anthropic — Orchestrator-subagent pattern","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Anthropic Cookbook — multi-agent orchestration","type":"article","url":"https://github.com/anthropics/anthropic-cookbook"}]}},{"id":13,"topic":"Pipeline pattern (послідовна передача)","outcome":"Агенти передають стан по ланцюжку","instruction":{"description":"Pipeline pattern — архітектура де кожен агент виконує один крок обробки і передає результат наступному по ланцюжку. На відміну від оркестратора, тут немає центрального координатора — кожен агент знає лише про свій вхід і вихід. Урок показує як будувати надійні агентні конвеєри зі структурованою передачею стану.","duration_minutes":90,"key_concepts":["pipeline","stage","state passing","chain","transformation","sequential processing","typed output"],"theory":[{"title":"Архітектура конвеєра","content":"Pipeline складається зі стадій (stages): кожна стадія — окремий агент з однією відповідальністю. Дані течуть в одному напрямку: Stage1 → Stage2 → Stage3. Кожна стадія: (1) отримує структурований вхід від попередньої, (2) трансформує його, (3) передає структурований вихід наступній. Ключова перевага над монолітним агентом: кожну стадію можна тестувати, замінювати і масштабувати незалежно."},{"title":"Структурований стан між стадіями","content":"Між стадіями потрібен явний контракт — що саме передається. Погана практика: передавати 'сирий текст' і дозволяти наступному агенту самостійно розбирати формат. Хороша практика: передавати typed dict або dataclass із конкретними полями (raw_text, summary, key_points, metadata). Такий підхід запобігає 'зламаному телефону' між стадіями."},{"title":"Обробка помилок у пайплайні","content":"Якщо одна стадія повернула помилку або порожній результат, пайплайн не повинен мовчки продовжувати. Правило: кожна стадія перевіряє вхідні дані і повертає explicit error замість порожнього результату. Стратегія відновлення: retry на тій самій стадії, fallback до спрощеного варіанту, або abort з повідомленням про те, яка стадія впала і чому."}],"examples":[{"title":"Тристадійний пайплайн: збір → аналіз → форматування","language":"python","code":"import anthropic\nfrom dataclasses import dataclass\n\nclient = anthropic.Anthropic()\n\n@dataclass\nclass PipelineState:\n    topic: str\n    raw_content: str = ''\n    analysis: str = ''\n    final_report: str = ''\n    error: str | None = None\n\ndef stage_collect(state: PipelineState) -> PipelineState:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=400,\n        system=\"Ти збирач інформації. Знаходь ключові факти.\",\n        messages=[{\"role\": \"user\", \"content\": \"Факти про: \" + state.topic}]\n    )\n    state.raw_content = resp.content[0].text\n    print(f\"Stage 1 (collect): {len(state.raw_content)} chars\")\n    return state\n\ndef stage_analyze(state: PipelineState) -> PipelineState:\n    if not state.raw_content:\n        state.error = \"Stage 1 returned empty result\"\n        return state\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=300,\n        system=\"Ти аналітик. Виявляй закономірності та висновки.\",\n        messages=[{\"role\": \"user\", \"content\": \"Проаналізуй: \" + state.raw_content}]\n    )\n    state.analysis = resp.content[0].text\n    print(f\"Stage 2 (analyze): {len(state.analysis)} chars\")\n    return state\n\ndef stage_format(state: PipelineState) -> PipelineState:\n    if state.error:\n        return state\n    combined = state.raw_content + state.analysis\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=400,\n        system=\"Ти редактор. Форматуй у чіткий структурований звіт.\",\n        messages=[{\"role\": \"user\", \"content\": \"Відформатуй: \" + combined}]\n    )\n    state.final_report = resp.content[0].text\n    print(f\"Stage 3 (format): done\")\n    return state\n\ndef run_pipeline(topic: str) -> str:\n    state = PipelineState(topic=topic)\n    for stage in [stage_collect, stage_analyze, stage_format]:\n        state = stage(state)\n        if state.error:\n            return f\"Pipeline failed: {state.error}\"\n    return state.final_report\n\nprint(run_pipeline(\"квантові обчислення\"))"}],"exercise":{"title":"Пайплайн для обробки документа","task":"Побудуй 4-стадійний пайплайн для аналізу новинної статті:\n1. Stage extract: витягує ключові факти (хто, що, коли, де)\n2. Stage sentiment: визначає тональність (позитивна/негативна/нейтральна) і причину\n3. Stage summary: стискає до 3 речень\n4. Stage tag: присвоює теги (наприклад: технології, економіка, наука)\nВикористай PipelineState dataclass з полями для кожної стадії.\nПротестуй на будь-якій новинній статті (можна придумати).","hints":["Додай поле stage_name до PipelineState — зручно для логування яка стадія впала","Кожна stage-функція приймає PipelineState і повертає PipelineState — це дозволяє використати for-loop","Якщо одна стадія впала, можна продовжити пайплайн зі спрощеним замінником замість abort"]},"resources":[{"title":"Anthropic — Pipeline pattern (Building effective agents)","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Python dataclasses — офіційна документація","type":"docs","url":"https://docs.python.org/3/library/dataclasses.html"}]}},{"id":14,"topic":"Supervisor pattern (контроль виконання)","outcome":"Агент-наглядач перевіряє результати","instruction":{"description":"Supervisor pattern додає шар контролю якості поверх звичайного виконавця: агент-наглядач перевіряє результат роботи агента-працівника і вирішує — прийняти, відхилити або попросити доробити. Урок показує як реалізувати цикл перевірки-виправлення що значно підвищує якість вихідних даних.","duration_minutes":90,"key_concepts":["supervisor","worker","validation","retry loop","quality control","feedback","acceptance criteria","max_retries"],"theory":[{"title":"Роль supervisor та worker","content":"Worker виконує задачу (пише код, текст, аналіз), Supervisor перевіряє результат за чіткими критеріями і дає структурований фідбек. Supervisor не переробляє роботу сам — він повертає конкретні зауваження: 'відсутній висновок', 'надто довго', 'фактична помилка в пункті 2'. Worker отримує фідбек і доробляє. Цей цикл повторюється поки Supervisor не затвердить результат або не вичерпається ліміт спроб."},{"title":"Критерії прийняття та структурована оцінка","content":"Supervisor повинен мати явні критерії оцінки, а не абстрактне 'чи гарно'. Ефективний підхід: попросити Supervisor повернути JSON з полями {approved: bool, score: 1-10, issues: [...], suggestions: [...]}. Структурована оцінка дозволяє: (а) Worker точно знає що виправити, (б) код може перевірити approved без парсингу тексту, (в) логи зберігають повну картину кожної ітерації."},{"title":"Захист від нескінченного циклу","content":"max_retries — обов'язковий параметр для Supervisor-Worker циклу. Якщо за 3 спроби Worker не досягнув прийнятної якості, Supervisor повертає найкращий з отриманих результатів (а не кидає помилку). Логуй кожну ітерацію: attempt_number, score, issues — це допомагає розуміти чи Worker покращується між спробами. Якщо score не зростає між спробами, зупиняйся раніше."}],"examples":[{"title":"Supervisor контролює якість написаного тексту","language":"python","code":"import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\ndef worker(task: str, feedback: str = '') -> str:\n    prompt = task\n    if feedback:\n        prompt += \"\\n\\nПопередня спроба мала проблеми: \" + feedback + \"\\nВиправ їх.\"\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=400,\n        system=\"Ти автор. Пиши чіткі структуровані тексти.\",\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    return resp.content[0].text\n\ndef supervisor(result: str, criteria: str) -> dict:\n    prompt = (\n        \"Оціни текст за критеріями: \" + criteria + \"\\n\\n\"\n        \"Текст для оцінки:\\n\" + result + \"\\n\\n\"\n        'Поверни JSON: {\"approved\": true/false, \"score\": 1-10, \"issues\": [\"...\"]}'\n    )\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=200,\n        system=\"Ти суворий редактор. Оцінюй об'єктивно.\",\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    try:\n        text = resp.content[0].text\n        start = text.index('{')\n        end = text.rindex('}') + 1\n        return json.loads(text[start:end])\n    except Exception:\n        return {\"approved\": False, \"score\": 0, \"issues\": [\"Supervisor parse error\"]}\n\ndef supervised_run(task: str, criteria: str, max_retries: int = 3) -> str:\n    feedback = ''\n    best_result, best_score = '', 0\n    for attempt in range(1, max_retries + 1):\n        result = worker(task, feedback)\n        evaluation = supervisor(result, criteria)\n        print(f\"Attempt {attempt}: score={evaluation['score']}, approved={evaluation['approved']}\")\n        if evaluation['score'] > best_score:\n            best_result, best_score = result, evaluation['score']\n        if evaluation['approved']:\n            return result\n        feedback = ', '.join(evaluation.get('issues', []))\n    return best_result\n\nresult = supervised_run(\n    task=\"Напиши вступ до статті про мультиагентні системи\",\n    criteria=\"має бути 3-5 речень, без жаргону, з конкретним прикладом\"\n)\nprint(result)"}],"exercise":{"title":"Supervisor для перевірки коду","task":"Побудуй систему Supervisor-Worker для генерації Python-функцій:\n1. Worker отримує задачу (наприклад: 'напиши функцію що сортує список словників за полем') і генерує код\n2. Supervisor перевіряє: чи є docstring, чи є обробка порожнього списку, чи є type hints\n3. Supervisor повертає JSON {approved, score, missing_items: [...]}\n4. Якщо не затверджено — Worker доробляє з урахуванням missing_items\n5. Максимум 3 спроби. Виведи фінальний код і скільки спроб знадобилось.","hints":["Критерії для Supervisor краще передавати як список рядків — так легше перевіряти кожен пункт окремо","Worker повинен бачити весь feedback з попередньої спроби — передавай його явно в prompt","Логуй attempt, score, missing_items на кожній ітерації — так видно чи Worker реально навчається"]},"resources":[{"title":"Anthropic — Supervisor pattern (Building effective agents)","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"LLM-as-Judge: оцінка якості через модель","type":"article","url":"https://arxiv.org/abs/2306.05685"}]}},{"id":15,"topic":"Swarm pattern (децентралізація)","outcome":"Peer-to-peer координація без центру","instruction":{"description":"Swarm pattern — децен
