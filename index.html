,\n        tools=email_tools,\n        messages=messages,\n    )\n    messages.append({\"role\": \"assistant\", \"content\": resp.content})\n    if resp.stop_reason == \"end_turn\":\n        break\n    if resp.stop_reason == \"tool_use\":\n        results = []\n        for block in resp.content:\n            if block.type == \"tool_use\":\n                result = execute_tool(block.name, block.input)\n                results.append({\"type\": \"tool_result\", \"tool_use_id\": block.id, \"content\": result})\n        messages.append({\"role\": \"user\", \"content\": results})\n\nprint(\"\\n=== Audit Log ===\")\nfor entry in audit_log:\n    print(json.dumps(entry, ensure_ascii=False))"}],"exercise":{"title":"Агент файлових операцій з approval gate та аудит-логом","task":"Побудуй агента що виконує файлові операції з трьома рівнями ризику:\n1. Визнач інструменти: read_file(path), list_files(dir), write_file(path, content), delete_file(path)\n2. Класифікуй: read=safe, list=safe, write=requires_approval, delete=always_reject\n3. Реалізуй approval_gate як у прикладі\n4. Audit log зберігай у файл audit.jsonl після кожного запуску\n5. Тест 1: запит 'Прочитай config.txt' — повинен виконатись автоматично\n6. Тест 2: запит 'Запиши нові дані в config.txt' — повинен запитати підтвердження\n7. Тест 3: запит 'Видали старі логи' — повинен бути заблокований навіть якщо Claude наполягає\n8. Перевір audit.jsonl — всі три події повинні бути записані","hints":["Симулюй файлові операції — реальний запис/читання не обов'язковий для навчання патерну","always_reject повинен ніколи не запитувати людину — просто відхиляти і логувати","Щоб переконатись що delete заблокований: додай assert що після виконання файл все ще існує"]},"resources":[{"title":"Anthropic — Human oversight patterns for agents","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"LangGraph — Human-in-the-loop концепція","type":"docs","url":"https://langchain-ai.github.io/langgraph/concepts/human_in_the_loop/"}]}},{"id":29,"topic":"Cost management: кешування та вибір моделі","outcome":"Зменшуєш витрати без втрати якості","instruction":{"description":"Вартість production агента = input_tokens × ціна + output_tokens × ціна, і вона швидко зростає у agentic loops де system prompt і tool definitions повторюються у кожному запиті. Prompt caching від Anthropic знижує ціну кешованих input tokens на 90%. Правильний вибір моделі (Haiku vs Sonnet) дає додаткові 10–25x заощаджень для підходящих задач.","duration_minutes":90,"key_concepts":["prompt caching","cache_control","cache_creation_input_tokens","cache_read_input_tokens","model selection","Haiku","Sonnet","token optimization","cost per call"],"theory":[{"title":"Де йдуть токени: анатомія витрат агента","content":"У типовому agentic loop з 10 кроками system prompt (~500 токенів) відправляється 10 разів = 5000 зайвих input tokens. Tool definitions ще ~300 токенів × 10 = 3000 зайвих. Якщо в контексті є документ (5000 токенів) — він також повторюється кожного разу. Разом: 85%+ витрат можуть бути на повторюваний контент. Вимірюй: response.usage.input_tokens і response.usage.output_tokens у кожному виклику, агрегуй за сесію. Оптимізуй тільки після вимірювання."},{"title":"Prompt caching: 90% економія на повторюваних токенах","content":"cache_control: {type: 'ephemeral'} позначає блок для кешування. Розміщується в кінці стабільного контенту: system prompt, tool definitions, довгий документ. Мінімальний блок: 1024 токени. TTL: 5 хвилин, оновлюється при кожному cache hit. Перший виклик: cache miss — трохи дорожче звичайного (cache_creation_input_tokens). Наступні виклики: cache hit — 90% дешевше. response.usage.cache_read_input_tokens показує скільки токенів прийшло з кешу. При правильному кешуванні за 10-кроковий agentic loop можна заощадити 80–90% витрат на input tokens."},{"title":"Вибір моделі: cascade стратегія","content":"claude-haiku-4-5-20251001: у ~10–20 разів дешевший за Sonnet; підходить для: класифікації, routing, простих відповідей, виклику інструментів де важлива структура а не якість тексту. claude-sonnet-4-6: оптимальний баланс якості та ціни для більшості задач. claude-opus-4-8: тільки для складного reasoning де якість критична. Cascade стратегія: спробуй Haiku → self-check 'чи відповідь достатньо якісна?' → якщо ні — повтори Sonnet. Для routing і classification: Haiku майже завжди достатньо."}],"examples":[{"title":"Агент з prompt caching і cascade вибором моделі","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\n# Великий system prompt (симулюємо довгий контекст)\nSYSTEM_PROMPT = \"\"\"Ти помічник з аналізу коду. \"\"\".strip() + \" \" + \"Аналізуй Python код: знаходь помилки, пропонуй покращення, пояснюй складні конструкції. \" * 60\n\nTOOLS = [\n    {\n        \"name\": \"analyze_code\",\n        \"description\": \"Аналізує Python код і повертає список проблем\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"code\": {\"type\": \"string\", \"description\": \"Python код для аналізу\"},\n                \"check_type\": {\"type\": \"string\", \"enum\": [\"bugs\", \"style\", \"performance\"]}\n            },\n            \"required\": [\"code\", \"check_type\"]\n        }\n    }\n]\n\ndef ask_with_cache(question: str, use_cache: bool = True) -> dict:\n    \"\"\"Задає питання з або без кешування системного промпту.\"\"\"\n    system_content = [\n        {\n            \"type\": \"text\",\n            \"text\": SYSTEM_PROMPT,\n            **({\n                \"cache_control\": {\"type\": \"ephemeral\"}\n            } if use_cache else {})\n        }\n    ]\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\",\n        max_tokens=200,\n        system=system_content,\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\n    return {\n        \"answer\": resp.content[0].text,\n        \"input_tokens\": resp.usage.input_tokens,\n        \"output_tokens\": resp.usage.output_tokens,\n        \"cache_read\": getattr(resp.usage, \"cache_read_input_tokens\", 0),\n        \"cache_write\": getattr(resp.usage, \"cache_creation_input_tokens\", 0),\n    }\n\n# Cascade: Haiku → Sonnet якщо відповідь непевна\ndef cascade_ask(question: str) -> str:\n    # Спочатку Haiku\n    resp_haiku = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=300,\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\n    answer = resp_haiku.content[0].text\n    # Self-check: чи Haiku впевнений?\n    check = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=10,\n        system=\"Відповідай тільки 'yes' або 'no'.\",\n        messages=[{\"role\": \"user\", \"content\": f\"Ця відповідь точна і повна: '{answer[:100]}'? Питання: {question[:100]}\"}]\n    )\n    confident = \"yes\" in check.content[0].text.lower()\n    if confident:\n        print(f\"  Haiku: впевнений ({resp_haiku.usage.input_tokens + resp_haiku.usage.output_tokens} tokens)\")\n        return answer\n    # Ескалація до Sonnet\n    print(f\"  Haiku: непевний → ескалуємо Sonnet\")\n    resp_sonnet = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=300,\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\n    return resp_sonnet.content[0].text\n\n# Демонстрація кешування: перший виклик = cache miss, наступні = cache hit\nquestions = [\"Що таке list comprehension?\", \"Поясни generators\", \"Чим відрізняється tuple від list?\"]\nprint(\"=== Тест кешування ===\")\nfor i, q in enumerate(questions):\n    result = ask_with_cache(q, use_cache=True)\n    hit = result[\"cache_read\"]\n    write = result[\"cache_write\"]\n    status = \"MISS (write)\" if write > 0 else (\"HIT\" if hit > 0 else \"no cache\")\n    print(f\"  Q{i+1}: {status}, input={result['input_tokens']}, cache_read={hit}\")\n\nprint(\"\\n=== Тест cascade ===\")\nfor q in [\"2+2=?\", \"Що таке квантова заплутаність?\"]:\n    print(f\"Q: {q}\")\n    answer = cascade_ask(q)\n    print(f\"A: {answer[:80]}...\\n\")"}],"exercise":{"title":"Оптимізований agentic loop: кешування + каскад моделей","task":"Виміряй і оптимізуй витрати існуючого agentic loop:\n1. Візьми агента з tool_use і system prompt (наприклад з уроку 10 або 12)\n2. Запусти 5 запитів БЕЗ кешування — збери input_tokens по кожному кроку\n3. Додай cache_control на system prompt і tool definitions\n4. Запусти ті самі 5 запитів З кешуванням — збери cache_read_input_tokens\n5. Обрахуй: скільки % токенів прийшло з кешу у кроках 2–5?\n6. Реалізуй cascade: routing-вузол (класифікація запиту) виконується Haiku, основний агент — Sonnet тільки для складних запитів\n7. Порівняй загальну розрахункову вартість: без оптимізації vs з кешем vs з каскадом","hints":["cache_control ставиться на останній елемент system масиву або останній tool у списку tools","Ціни для розрахунку (приблизні): Haiku input $0.80/1M tokens, Sonnet input $3/1M, Opus input $15/1M","cache_read_input_tokens коштує ~10% від звичайного input; cache_creation_input_tokens — ~125% (перший запис дорожчий)"]},"resources":[{"title":"Anthropic Docs — Prompt caching","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching"},{"title":"Anthropic Docs — Models overview та ціни","type":"docs","url":"https://docs.anthropic.com/en/docs/about-claude/models/overview"}]}}]},{"id":9,"name":"Проекти","lesson_count":4,"lessons":[{"id":30,"topic":"Research agent","outcome":"Orchestrator + пошук + синтез → звіт"},{"id":31,"topic":"Parallel code review","outcome":"PR → паралельні subagents → фінальний огляд"},{"id":32,"topic":"Data pipeline agent","outcome":"Читання → трансформація → звітування"},{"id":33,"topic":"Multi-domain support","outcome":"Router → спеціалізовані агенти per domain"}]}]};

// ── State ──────────────────────────────────────────
let activeLessonId = 1;
const completedLessons = new Set();

// ── Helpers ────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

const flatLessons = CURRICULUM.modules.flatMap(m =>
  m.lessons.map(l => ({ ...l, moduleId: m.id, moduleName: m.name }))
);

function findLesson(id) { return flatLessons.find(l => l.id === id); }
function findIndex(id) { return flatLessons.findIndex(l => l.id === id); }

// ── Sidebar ────────────────────────────────────────
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  CURRICULUM.modules.forEach(module => {
    const hasActive = module.lessons.some(l => l.id === activeLessonId);
    const el = document.createElement('div');
    el.className = 'module-item' + (hasActive ? ' open' : '');

    el.innerHTML = `
      <div class="module-header">
        <svg class="module-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="module-num">M${module.id}</span>
        <span class="module-name">${esc(module.name)}</span>
        <span class="module-count">${module.lesson_count}</span>
      </div>
      <div class="module-lessons">
        ${module.lessons.map(lesson => `
          <div class="lesson-item${lesson.id === activeLessonId ? ' active' : ''}${completedLessons.has(lesson.id) ? ' completed' : ''}" data-id="${lesson.id}">
            <div class="lesson-dot">
              <svg class="dot-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="lesson-info">
              <div class="lesson-num">Урок ${lesson.id}</div>
              <div class="lesson-name">${esc(lesson.topic)}</div>
            </div>
          </div>
        `).join('')}
      </div>`;

    el.querySelector('.module-header').addEventListener('click', () => el.classList.toggle('open'));
    el.querySelectorAll('.lesson-item').forEach(item => {
      item.addEventListener('click', () => navigateTo(Number(item.dataset.id)));
    });

    nav.appendChild(el);
  });

  updateProgress();
}

function updateProgress() {
  const done = completedLessons.size;
  const total = CURRICULUM.total_lessons;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} уроків · ${pct}%`;
}

// ── Lesson content ─────────────────────────────────
function renderLesson(id) {
  const lesson = findLesson(id);
  if (!lesson) return;

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `<span>${esc(lesson.moduleName)}</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Урок ${id}</span>`;

  const wrap = document.getElementById('content');
  const ins = lesson.instruction;

  if (!ins) {
    wrap.innerHTML = `
      <div class="coming-soon">
        <div class="cs-icon">🚧</div>
        <div class="cs-title">${esc(lesson.topic)}</div>
        <div class="cs-sub">Детальний матеріал для цього уроку ще в розробці. Ознайомтесь з темою і підготуйтесь!</div>
        <div class="outcome-card">
          <div class="outcome-label">Результат уроку</div>
          <div class="outcome-text">${esc(lesson.outcome)}</div>
        </div>
      </div>`;
    renderBottomNav(id);
    return;
  }

  const isDone = completedLessons.has(id);
  const typeIcons = { docs: '📄', article: '📰', video: '🎬' };

  let html = `
    <div class="lesson-meta">
      <span class="badge badge-module">Модуль ${lesson.moduleId} · ${esc(lesson.moduleName)}</span>
      <span class="badge badge-duration">⏱ ${ins.duration_minutes} хв</span>
    </div>
    <h1 class="lesson-title">${esc(lesson.topic)}</h1>
    <div class="lesson-outcome">${esc(lesson.outcome)}</div>
    <p class="lesson-description">${esc(ins.description)}</p>`;

  if (ins.key_concepts?.length) {
    html += `<div class="section-block">
      <div class="section-label">Ключові концепції</div>
      <div class="concepts-list">${ins.key_concepts.map(c => `<span class="concept-tag">${esc(c)}</span>`).join('')}</div>
    </div>`;
  }

  if (ins.theory?.length) {
    html += `<div class="section-block">
      <h2 class="section-title">Теорія</h2>
      <div class="theory-cards">
        ${ins.theory.map((t, i) => `
          <div class="theory-card${i === 0 ? ' open' : ''}">
            <div class="theory-card-header">
              <span class="theory-card-title">${esc(t.title)}</span>
              <svg class="theory-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="theory-card-body">${esc(t.content)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (ins.examples?.length) {
    html += `<div class="section-block">
      <h2 class="section-title">Приклади коду</h2>
      ${ins.examples.map((ex, i) => `
        <div class="example-block">
          <div class="example-header">
            <span class="example-title">${esc(ex.title)}</span>
            <div class="example-right">
              <span class="lang-badge">${esc(ex.language)}</span>
              <button class="copy-btn" data-ci="${i}">копіювати</button>
            </div>
          </div>
          <div class="example-code"><pre data-pi="${i}"></pre></div>
        </div>`).join('')}
    </div>`;
  }

  if (ins.exercise) {
    html += `<div class="section-block">
      <h2 class="section-title">Практика</h2>
      <div class="exercise-box">
        <div class="exercise-title">🏋️ ${esc(ins.exercise.title)}</div>
        <div class="exercise-task" id="ex-task"></div>
        ${ins.exercise.hints?.length ? `
          <button class="hints-toggle" id="hints-btn">💡 Показати підказки (${ins.exercise.hints.length})</button>
          <ul class="hints-list" id="hints-list">
            ${ins.exercise.hints.map(h => `<li class="hint-item"><span class="hint-icon">💡</span>${esc(h)}</li>`).join('')}
          </ul>` : ''}
      </div>
    </div>`;
  }

  if (ins.resources?.length) {
    html += `<div class="section-block">
      <h2 class="section-title">Ресурси</h2>
      <div class="resources-list">
        ${ins.resources.map(r => `
          <a href="${esc(r.url)}" target="_blank" rel="noopener" class="resource-link">
            <div class="resource-icon ri-${esc(r.type)}">${typeIcons[r.type] || '🔗'}</div>
            <div class="resource-info">
              <div class="resource-title">${esc(r.title)}</div>
              <div class="resource-type">${esc(r.type)}</div>
            </div>
            <svg class="resource-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>`).join('')}
      </div>
    </div>`;
  }

  html += `<button class="complete-btn${isDone ? ' done' : ''}" id="complete-btn">
    ${isDone ? '✓ Урок завершено' : '✓ Позначити як завершений'}
  </button>`;

  wrap.innerHTML = html;
  wrap.closest('.content-wrap').scrollTop = 0;

  // Set code content via textContent (safe for any chars)
  ins.examples?.forEach((ex, i) => {
    const pre = wrap.querySelector(`[data-pi="${i}"]`);
    if (pre) pre.textContent = ex.code;
  });

  // Set exercise task
  if (ins.exercise) {
    const taskEl = wrap.querySelector('#ex-task');
    if (taskEl) taskEl.textContent = ins.exercise.task;
  }

  // Theory toggle
  wrap.querySelectorAll('.theory-card').forEach(card => {
    card.querySelector('.theory-card-header').addEventListener('click', () => card.classList.toggle('open'));
  });

  // Copy buttons
  wrap.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = ins.examples[Number(btn.dataset.ci)].code;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✓ скопійовано';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'копіювати'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {});
    });
  });

  // Hints toggle
  const hintsBtn = wrap.querySelector('#hints-btn');
  if (hintsBtn) {
    const hintsList = wrap.querySelector('#hints-list');
    hintsBtn.addEventListener('click', () => {
      const open = hintsList.classList.toggle('visible');
      hintsBtn.textContent = open
        ? `💡 Сховати підказки`
        : `💡 Показати підказки (${ins.exercise.hints.length})`;
    });
  }

  // Complete button
  const completeBtn = wrap.querySelector('#complete-btn');
  if (completeBtn && !isDone) {
    completeBtn.addEventListener('click', () => {
      completedLessons.add(id);
      completeBtn.textContent = '✓ Урок завершено';
      completeBtn.classList.add('done');
      renderSidebar();
      const idx = findIndex(id);
      if (idx < flatLessons.length - 1) {
        setTimeout(() => navigateTo(flatLessons[idx + 1].id), 700);
      }
    });
  }

  renderBottomNav(id);
}

// ── Bottom nav ─────────────────────────────────────
function renderBottomNav(id) {
  const idx = findIndex(id);
  const prev = idx > 0 ? flatLessons[idx - 1] : null;
  const next = idx < flatLessons.length - 1 ? flatLessons[idx + 1] : null;

  const nav = document.getElementById('bottom-nav');
  nav.innerHTML = `
    <button class="nav-btn" id="btn-prev" ${!prev ? 'disabled' : ''}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Попередній
    </button>
    <div class="nav-center">
      <div class="nav-counter">Урок ${id} з ${CURRICULUM.total_lessons}</div>
      <div class="nav-next-title">${next ? esc(next.topic) : 'Кінець курсу 🎉'}</div>
    </div>
    <button class="nav-btn" id="btn-next" ${!next ? 'disabled' : ''}>
      Наступний
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;

  if (prev) nav.querySelector('#btn-prev').addEventListener('click', () => navigateTo(prev.id));
  if (next) nav.querySelector('#btn-next').addEventListener('click', () => navigateTo(next.id));
}

// ── Navigate ───────────────────────────────────────
function navigateTo(id) {
  activeLessonId = id;
  renderSidebar();
  renderLesson(id);
  // Scroll active item into view
  const active = document.querySelector('.lesson-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Init ───────────────────────────────────────────
renderSidebar();
renderLesson(1);
</script>
</body>
</html>
