тралізований підхід де агенти координуються без центрального оркестратора. Кожен агент самостійно вирішує що робити далі на основі поточного стану, а складна поведінка виникає з простих локальних правил. Урок показує реалізацію swarm через спільний стан і систему передачі управління між агентами.","duration_minutes":90,"key_concepts":["swarm","decentralization","shared state","handoff","emergence","peer-to-peer","triage","routing"],"theory":[{"title":"Децентралізована координація","content":"У swarm немає одного агента що 'керує всім'. Замість цього кожен агент: (1) читає поточний стан задачі зі спільного контексту, (2) виконує свою частину або передає управління (handoff) іншому агенту, (3) оновлює спільний стан. Система в цілому вирішує складні задачі через взаємодію простих агентів — це і є emergent behavior. Перевага: відсутність єдиної точки відмови."},{"title":"Спільний стан і передача управління","content":"Замість черги повідомлень між агентами, swarm використовує спільний об'єкт стану (dict або dataclass) до якого кожен агент має доступ. Handoff — це рішення поточного агента передати управління іншому агенту разом із оновленим станом. Типова реалізація: агент повертає {next_agent: 'name', state: {...}}, і runner вирішує кого викликати далі."},{"title":"Агент-triage як точка входу","content":"Навіть в децентралізованому swarm зазвичай є один агент-маршрутизатор (triage), що аналізує початковий запит і вирішує якому спеціалісту його передати. Це не оркестратор — triage не координує весь процес, він лише визначає першу точку входу. Далі агенти передають управління один одному самостійно на основі поточного стану запиту."}],"examples":[{"title":"Swarm з агентом-маршрутизатором та спеціалістами","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\ndef call_agent(system: str, user: str, max_tokens: int = 300) -> str:\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=max_tokens,\n        system=system,\n        messages=[{\"role\": \"user\", \"content\": user}]\n    )\n    return resp.content[0].text\n\ndef triage_agent(state: dict) -> dict:\n    query = state[\"query\"]\n    decision = call_agent(\n        system=\"Визнач тему запиту. Відповідай ТІЛЬКИ одним словом: tech, finance, або general\",\n        user=query\n    ).strip().lower()\n    state[\"route\"] = decision if decision in [\"tech\", \"finance\"] else \"general\"\n    print(f\"[Triage] routing to: {state['route']}\")\n    return state\n\ndef tech_agent(state: dict) -> dict:\n    state[\"answer\"] = call_agent(\n        system=\"Ти технічний експерт. Давай точні технічні відповіді.\",\n        user=state[\"query\"]\n    )\n    print(\"[Tech] answered\")\n    return state\n\ndef finance_agent(state: dict) -> dict:\n    state[\"answer\"] = call_agent(\n        system=\"Ти фінансовий аналітик. Аналізуй ринки та фінанси.\",\n        user=state[\"query\"]\n    )\n    print(\"[Finance] answered\")\n    return state\n\ndef general_agent(state: dict) -> dict:\n    state[\"answer\"] = call_agent(\n        system=\"Ти помічник загального призначення.\",\n        user=state[\"query\"]\n    )\n    print(\"[General] answered\")\n    return state\n\nAGENTS = {\n    \"triage\": triage_agent,\n    \"tech\": tech_agent,\n    \"finance\": finance_agent,\n    \"general\": general_agent\n}\n\ndef run_swarm(query: str) -> str:\n    state = {\"query\": query, \"route\": \"triage\", \"answer\": \"\"}\n    # Починаємо з triage, далі агенти вирішують самостійно\n    for agent_name in [\"triage\", state.get(\"route\", \"general\")]:\n        fn = AGENTS.get(agent_name)\n        if fn:\n            state = fn(state)\n    return state.get(\"answer\", \"Немає відповіді\")\n\nprint(run_swarm(\"Як інвестувати в ETF?\"))\nprint(run_swarm(\"Що таке Docker?\"))"}],"exercise":{"title":"Swarm для підтримки користувачів","task":"Побудуй swarm-систему підтримки з 4 агентами:\n1. triage_agent: визначає тип запиту (billing/technical/account/general)\n2. billing_agent: відповідає на питання про оплату\n3. technical_agent: вирішує технічні проблеми\n4. account_agent: допомагає з акаунтом\nКожен спеціаліст може передати запит назад до triage якщо запит поза його компетенцією (встанови поле needs_reroute в state).\nПротестуй на 5 різних запитах і перевір що маршрутизація коректна.","hints":["State може містити поле visited_agents: list щоб уникати циклічних передач між агентами","Triage краще просити відповісти ТІЛЬКИ одним словом з переліку — це спрощує парсинг маршруту","Обмеж загальну кількість хопів (наприклад max_hops=3) щоб запит не зависав між агентами"]},"resources":[{"title":"Anthropic — Swarm and handoff patterns","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"OpenAI Swarm — reference implementation","type":"article","url":"https://github.com/openai/swarm"}]}},{"id":16,"topic":"Вибір патерну: коли що використовувати","outcome":"Архітектурне мислення для нових задач","instruction":{"description":"Після вивчення чотирьох патернів координації потрібен чіткий фреймворк для вибору між ними. Урок дає практичні критерії рішення: коли оркестратор, коли пайплайн, коли supervisor, коли swarm — і як комбінувати патерни для складних систем.","duration_minutes":90,"key_concepts":["pattern selection","decision framework","hybrid architecture","trade-offs","complexity","fault tolerance","scalability","use case mapping"],"theory":[{"title":"Критерії вибору патерну","content":"Чотири запитання допоможуть вибрати патерн: (1) Чи є центральна задача що потребує декомпозиції? → Orchestrator. (2) Чи проходять дані послідовні стадії трансформації? → Pipeline. (3) Чи потрібна перевірка якості і можливість доробки? → Supervisor. (4) Чи різні типи запитів потребують різних спеціалістів без централізації? → Swarm. Якщо відповідь 'так' на кілька — розглянь гібридний підхід."},{"title":"Компроміси між патернами","content":"Orchestrator: гнучкий, але оркестратор — єдина точка відмови. Pipeline: простий і передбачуваний, але жорсткий (важко обійти стадії). Supervisor: підвищує якість, але подвоює кількість API викликів і час. Swarm: відказостійкий і масштабований, але важко налагоджувати і передбачати поведінку. Правило: обирай найпростіший патерн що вирішує задачу — складність додавай лише коли є конкретна потреба."},{"title":"Гібридні архітектури","content":"Реальні системи комбінують патерни: Orchestrator + Supervisor (оркестратор делегує, supervisor перевіряє результати субагентів), Pipeline + Swarm (дані проходять стадії, але всередині стадії є swarm для маршрутизації), Supervisor + Pipeline (supervisor контролює весь пайплайн а не лише окремі агенти). При проектуванні гібриду: починай з найпростішого патерну і додавай шар за шаром лише коли з'являється конкретна проблема."}],"examples":[{"title":"Фреймворк вибору патерну у вигляді функції","language":"python","code":"def choose_pattern(task: dict) -> str:\n    \"\"\"\n    task: {\n        \"needs_decomposition\": bool,   # задачу треба розбити на підзадачі\n        \"sequential_stages\": bool,      # дані проходять послідовні трансформації\n        \"needs_quality_check\": bool,    # результат потребує перевірки\n        \"multiple_specializations\": bool, # різні запити до різних спеціалістів\n        \"fault_tolerance_critical\": bool  # система не може мати single point of failure\n    }\n    \"\"\"\n    # Swarm: коли важлива відказостійкість і є різні спеціалісти\n    if task['fault_tolerance_critical'] and task['multiple_specializations']:\n        return 'Swarm'\n\n    # Supervisor: коли якість критична і допустимі retry\n    if task['needs_quality_check'] and not task['fault_tolerance_critical']:\n        if task['needs_decomposition']:\n            return 'Orchestrator + Supervisor'\n        return 'Supervisor'\n\n    # Pipeline: коли є чіткі послідовні стадії\n    if task['sequential_stages'] and not task['needs_decomposition']:\n        return 'Pipeline'\n\n    # Orchestrator: базовий вибір для декомпозиції\n    if task['needs_decomposition']:\n        return 'Orchestrator'\n\n    return 'Single Agent'\n\n\n# Приклади вибору:\ntasks = [\n    {\"name\": \"Написати звіт\", \"needs_decomposition\": True, \"sequential_stages\": False,\n     \"needs_quality_check\": True, \"multiple_specializations\": False, \"fault_tolerance_critical\": False},\n    {\"name\": \"Підтримка клієнтів\", \"needs_decomposition\": False, \"sequential_stages\": False,\n     \"needs_quality_check\": False, \"multiple_specializations\": True, \"fault_tolerance_critical\": True},\n    {\"name\": \"Обробка документа\", \"needs_decomposition\": False, \"sequential_stages\": True,\n     \"needs_quality_check\": False, \"multiple_specializations\": False, \"fault_tolerance_critical\": False},\n]\n\nfor t in tasks:\n    pattern = choose_pattern(t)\n    print(f\"{t['name']}: -> {pattern}\")"}],"exercise":{"title":"Архітектурне проектування реальної системи","task":"Обери одну з трьох систем і спроектуй її мультиагентну архітектуру:\nА) Автоматична перевірка та коментування pull requests\nБ) Агент для дослідження ринку: збирає дані, аналізує тренди, генерує звіт\nВ) Система підтримки онлайн-магазину: замовлення, повернення, технічні питання\n\nДля обраної системи:\n1. Заповни таблицю критеріїв і вибери основний патерн\n2. Визнач яких агентів потрібно і їхні ролі\n3. Намалюй (або опиши) схему взаємодії агентів\n4. Визнач 2 ризики архітектури і як їх мінімізувати\n5. Реалізуй мінімальний прототип (mock-функції замість реальних API)","hints":["Починай з мінімального патерну — якщо можна обійтись Pipeline, не додавай Supervisor без причини","Ризики часто пов'язані з єдиними точками відмови та неявними залежностями між агентами","Прототип з mock-функціями важливіший за теоретичну схему — він показує де реальні складності"]},"resources":[{"title":"Anthropic — Choosing the right agentic pattern","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Martin Fowler — Patterns of Enterprise Application Architecture","type":"article","url":"https://martinfowler.com/books/eaa.html"}]}}]},{"id":5,"name":"Пам'ять та стан","lesson_count":3,"lessons":[{"id":17,"topic":"Short-term memory: стан у контексті","outcome":"Передаєш стан між кроками агента","instruction":{"description":"Short-term memory агента — це message history, яка існує лише протягом одного запуску. Урок пояснює як правильно структурувати стан у контексті, які патерни scratchpad дозволяють агенту 'тримати в голові' проміжні результати та коли in-context пам'яті достатньо без зовнішнього сховища.","duration_minutes":90,"key_concepts":["short-term memory","message history","scratchpad","in-context state","conversation state","working memory","stateful agent"],"theory":[{"title":"Як message history є пам'яттю агента","content":"Кожен виклик Claude API stateless — модель не пам'ятає попередніх запитів. Але якщо ми передаємо повну messages historу при кожному кроці, агент ефективно 'пам'ятає' всі попередні дії. Це short-term memory: вона існує поки є сесія, зникає коли запуск завершується. Правило: якщо стан потрібен лише протягом одного запуску — message history достатньо і зовнішнє сховище зайве."},{"title":"Scratchpad: структурований проміжний стан","content":"Scratchpad — це окремий словник або рядок поза messages, де агент зберігає проміжні результати: знайдені URL, часткові відповіді, лічильники, статуси підзадач. Два підходи: (1) Зовнішній scratchpad у Python-змінній — агент читає/пише через спеціальні інструменти read_scratchpad/write_scratchpad; (2) Внутрішній scratchpad у system prompt — оновлюється перед кожним кроком. Зовнішній підхід надійніший: не залежить від того чи модель правильно витягне дані з тексту."},{"title":"Коли in-context пам'яті достатньо","content":"In-context пам'ять підходить коли: задача завершується в одному запуску, обсяг стану не перевищує контекстне вікно, дані не потрібні між різними сесіями. Вона НЕ підходить коли: агент запускається кілька разів незалежно (потрібна persistent memory), стан занадто великий (потрібне стиснення або зовнішнє сховище), кілька агентів мають спільний доступ до стану (потрібна shared database)."}],"examples":[{"title":"Агент зі scratchpad через інструменти","language":"python","code":"import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\n# Зовнішній scratchpad поза messages\nscratchpad = {}\n\ntools = [\n    {\n        \"name\": \"write_scratchpad\",\n        \"description\": \"Зберігає значення в scratchpad за ключем\",\n        \"input_schema\": {\"type\": \"object\",\n                         \"properties\": {\"key\": {\"type\": \"string\"}, \"value\": {\"type\": \"string\"}},\n                         \"required\": [\"key\", \"value\"]}\n    },\n    {\n        \"name\": \"read_scratchpad\",\n        \"description\": \"Читає значення зі scratchpad за ключем\",\n        \"input_schema\": {\"type\": \"object\",\n                         \"properties\": {\"key\": {\"type\": \"string\"}},\n                         \"required\": [\"key\"]}\n    }\n]\n\ndef handle_tool(name: str, inp: dict) -> str:\n    if name == \"write_scratchpad\":\n        scratchpad[inp[\"key\"]] = inp[\"value\"]\n        return f\"Saved: {inp['key']} = {inp['value']}\"\n    elif name == \"read_scratchpad\":\n        return scratchpad.get(inp[\"key\"], \"Not found\")\n    return \"Unknown tool\"\n\ndef run_agent(task: str) -> str:\n    messages = [{\"role\": \"user\", \"content\": task}]\n    for _ in range(8):\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-6\", max_tokens=600,\n            system=\"Використовуй scratchpad для збереження проміжних результатів.\",\n            tools=tools, messages=messages\n        )\n        messages.append({\"role\": \"assistant\", \"content\": resp.content})\n        if resp.stop_reason == \"end_turn\":\n            return next((b.text for b in resp.content if hasattr(b, 'text')), '')\n        results = []\n        for b in resp.content:\n            if b.type == \"tool_use\":\n                result = handle_tool(b.name, b.input)\n                results.append({\"type\": \"tool_result\", \"tool_use_id\": b.id, \"content\": result})\n        messages.append({\"role\": \"user\", \"content\": results})\n    return \"Ліміт ітерацій\"\n\nprint(run_agent(\"Порахуй суму чисел від 1 до 5, зберігаючи проміжні результати у scratchpad\"))\nprint(\"Final scratchpad:\", scratchpad)"}],"exercise":{"title":"Агент-планувальник з in-context станом","task":"Побудуй агента-планувальника задач з трьома інструментами:\n- add_task(title, priority) → додає задачу до списку (зовнішній Python dict)\n- get_tasks(status) → повертає задачі за статусом (pending/done/all)\n- complete_task(title) → позначає задачу виконаною\n\nПроведи 5-крокову сесію:\n1. 'Додай задачу: написати тести, пріоритет high'\n2. 'Додай задачу: зробити документацію, пріоритет low'\n3. 'Покажи всі pending задачі'\n4. 'Познач написати тести як виконану'\n5. 'Скільки задач залишилось?'\n\nПереконайся що стан зберігається між кроками через зовнішній словник.","hints":["Зберігай tasks як dict {title: {priority, status}} поза агентом — інструменти читають/пишуть через closure","get_tasks з фільтром по status зручніше ніж повертати весь список — агент отримує тільки потрібне","Виводь len(messages) після кожного кроку щоб бачити ріст контексту між кроками"]},"resources":[{"title":"Anthropic — In-context state and memory","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use"},{"title":"Anthropic — Building effective agents (Memory section)","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}},{"id":18,"topic":"Long-term memory: векторні БД та семантичний пошук","outcome":"Агент пам'ятає між запусками","instruction":{"description":"Long-term memory дозволяє агенту пам'ятати між незалежними запусками через зовнішнє сховище. Векторні бази даних зберігають embedded-представлення спогадів і дозволяють знаходити семантично близький контекст за новим запитом. Урок пояснює як будувати просту систему векторної пам'яті та коли вона потрібна.","duration_minutes":90,"key_concepts":["long-term memory","embeddings","vector database","semantic search","cosine similarity","retrieval","memory store","persistent memory"],"theory":[{"title":"Embeddings як числове представлення смислу","content":"Embedding — це вектор чисел (наприклад 1536 float), що кодує семантичний зміст тексту. Схожі за змістом тексти мають близькі вектори в багатовимірному просторі. Claude не генерує embeddings напряму, але їх можна отримати через окремі API (наприклад text-embedding-3-small від OpenAI або власну модель). Для порівняння векторів використовується cosine similarity: значення близьке до 1 означає семантичну схожість."},{"title":"Векторна БД: збереження та пошук спогадів","content":"Векторна база даних (ChromaDB, Pinecone, Weaviate) зберігає пари (embedding, metadata). При новому запиті: (1) embed запит, (2) знайти k найближчих векторів у базі, (3) повернути відповідний text/metadata. Для невеликих систем (до кількох тисяч записів) можна використати просту реалізацію на numpy без зовнішньої бази. Для production — ChromaDB (локальна, без сервера) або Pinecone (хмарна)."},{"title":"Патерн: пам'ять агента між сесіями","content":"Типова реалізація: після кожної сесії агент створює 'спогад' — стислий опис що відбулось і що важливо пам'ятати. Цей спогад зберігається з embedding у векторну базу. На початку нової сесії: embed поточний запит, знайти 3–5 релевантних спогадів, додати їх до system prompt. Так агент 'пам'ятає' лише релевантне, а не весь архів — це ефективніше за зберігання повної history."}],"examples":[{"title":"Проста векторна пам'ять на numpy (без зовнішньої БД)","language":"python","code":"import anthropic\nimport json\nimport math\n\nclient = anthropic.Anthropic()\n\n# Проста векторна пам'ять у пам'яті процесу\nmemory_store = []  # [{text, embedding}]\n\ndef embed_text(text: str) -> list[float]:\n    # Використовуємо Claude щоб отримати хеш-вектор через числові токени\n    # У продакшені використовуй text-embedding-3-small або схожу модель\n    # Для демо: простий детермінований псевдо-вектор на основі символів\n    vec = [0.0] * 64\n    for i, ch in enumerate(text[:256]):\n        vec[i % 64] += ord(ch) / 1000.0\n    norm = math.sqrt(sum(x * x for x in vec)) or 1.0\n    return [x / norm for x in vec]\n\ndef cosine_sim(a: list[float], b: list[float]) -> float:\n    return sum(x * y for x, y in zip(a, b))\n\ndef remember(text: str):\n    memory_store.append({'text': text, 'embedding': embed_text(text)})\n    print(f\"Memorized: {text[:60]}...\")\n\ndef recall(query: str, top_k: int = 3) -> list[str]:\n    q_emb = embed_text(query)\n    scored = [(cosine_sim(q_emb, m['embedding']), m['text']) for m in memory_store]\n    scored.sort(reverse=True)\n    return [text for _, text in scored[:top_k]]\n\ndef ask_with_memory(question: str) -> str:\n    memories = recall(question)\n    context = 'Relevant memories:\\n' + '\\n'.join(f'- {m}' for m in memories) if memories else ''\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=300,\n        system='Ти помічник з довготривалою пам\\'яттю.' + ('\\n' + context if context else ''),\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\n    return resp.content[0].text\n\n# Збережемо кілька спогадів\nremember(\"Користувач любить Python і працює над мультиагентними системами\")\nremember(\"Минулого разу обговорювали патерн Orchestrator + Subagents\")\nremember(\"Користувач хоче навчитись векторним базам даних\")\n\n# Задаємо питання — агент знайде релевантні спогади\nprint(ask_with_memory(\"Що ми обговорювали минулого разу?\"))"}],"exercise":{"title":"Агент-щоденник з персистентною пам'яттю","task":"Побудуй агента-щоденника що запам'ятовує записи між сесіями:\n1. Реалізуй клас MemoryAgent з методами:\n   - add_memory(text): зберігає запис з embedding\n   - search_memory(query, k=3): повертає k найрелевантніших записів\n   - save_to_file(path) / load_from_file(path): персистентність між запусками\n2. Збережи 5 'записів у щоденнику' (різні теми: робота, хобі, плани)\n3. Зроби запит 'Що я планував?'\n4. Збережи пам'ять у файл, очисти memory_store, завантаж з файлу\n5. Перевір що пошук після перезавантаження дає ті самі результати","hints":["Для збереження у файл: json.dump([{'text': m['text'], 'embedding': m['embedding']} for m in store], f)","cosine_sim на numpy дуже швидша ніж pure Python: np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b))","У продакшені замість self.embed_text використовуй anthropic або OpenAI embeddings API — якість пошуку буде значно кращою"]},"resources":[{"title":"ChromaDB — локальна векторна БД для Python","type":"docs","url":"https://docs.trychroma.com/getting-started"},{"title":"Anthropic — Memory and storage patterns","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"}]}},{"id":19,"topic":"Episodic memory та стиснення контексту","outcome":"Агент підсумовує минулі сесії","instruction":{"description":"Episodic memory — це збережені стислі записи минулих сесій що дозволяють агенту будувати довготривале розуміння без накопичення повної history. Урок показує як стискати тривалі сесії в episodic records і використовувати їх для персоналізації наступних запусків.","duration_minutes":90,"key_concepts":["episodic memory","session summarization","context compression","memory consolidation","episodic record","retrieval-augmented memory","progressive summarization"],"theory":[{"title":"Що таке episodic memory","content":"Episodic memory — запис конкретного епізоду (сесії): що відбулось, які рішення були прийняті, що важливо пам'ятати. На відміну від semantic memory (факти про світ), episodic зберігає 'що ми робили разом'. Типовий episodic record містить: дату, ціль сесії, ключові кроки, результат, невирішені питання. Такий запис займає 200–500 токенів проти десятків тисяч у повній history."},{"title":"Прогресивне стиснення контексту","content":"Стратегія прогресивного стиснення: (1) Після кожних N кроків стискаємо старі повідомлення в summary; (2) Зберігаємо summary + останні K повідомлень; (3) При наступному стисненні нове summary включає попереднє. Перевага: агент завжди має 'свіжий' детальний контекст + стислий архів. Виклик: summary може втратити важливі деталі — тому завжди зберігай оригінал і додавай structured fields (key_decisions, open_questions)."},{"title":"Memory consolidation: від сесії до знання","content":"Наприкінці сесії агент (або окремий consolidation agent) аналізує всю history і витягає: (1) Episodic record — що відбулось у цій сесії; (2) Semantic updates — нові факти про користувача або предметну область; (3) Procedural hints — що спрацювало добре або погано. Ці три типи зберігаються окремо і завантажуються вибірково на початку нових сесій залежно від контексту запиту."}],"examples":[{"title":"Автоматичне створення episodic record після сесії","language":"python","code":"import anthropic\nimport json\nfrom datetime import datetime\n\nclient = anthropic.Anthropic()\n\ndef create_episodic_record(messages: list[dict]) -> dict:\n    \"\"\"Стискає сесію в episodic record через окремий виклик моделі.\"\"\"\n    history_text = '\\n'.join(\n        f\"{m['role'].upper()}: {m['content'] if isinstance(m['content'], str) else '[tool call]'}\"\n        for m in messages\n    )\n    prompt = (\n        'Проаналізуй цю сесію і поверни JSON з полями:\\n'\n        '{\"goal\": \"мета сесії\", \"steps\": [\"крок1\", \"крок2\"], '\n        '\"result\": \"результат\", \"open_questions\": [\"питання\"], '\n        '\"key_facts\": [\"факт про користувача\"]}\\n\\n'\n        'Сесія:\\n' + history_text\n    )\n    resp = client.messages.create(\n        model=\"claude-sonnet-4-6\", max_tokens=400,\n        system=\"Ти memory consolidator. Стискай сесії в структуровані записи.\",\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    try:\n        text = resp.content[0].text\n        start = text.index('{')\n        end = text.rindex('}') + 1\n        record = json.loads(text[start:end])\n    except Exception:\n        record = {\"goal\": \"unknown\", \"result\": resp.content[0].text}\n    record['timestamp'] = datetime.now().isoformat()\n    return record\n\ndef load_relevant_episodes(episodes: list[dict], current_goal: str) -> str:\n    \"\"\"Повертає стислий контекст з релевантних минулих епізодів.\"\"\"\n    if not episodes:\n        return ''\n    # Беремо останні 3 епізоди (у production — векторний пошук)\n    recent = episodes[-3:]\n    lines = []\n    for ep in recent:\n        lines.append(\n            f\"[{ep.get('timestamp', '?')[:10]}] {ep.get('goal', '?')}: {ep.get('result', '?')}\"\n        )\n    return 'Попередні сесії:\\n' + '\\n'.join(lines)\n\n# Симуляція: зберегли сесію і завантажуємо її на початку нової\npast_session_messages = [\n    {\"role\": \"user\", \"content\": \"Навчи мене що таке embeddings\"},\n    {\"role\": \"assistant\", \"content\": \"Embeddings — це вектори що кодують смисл тексту...\"},\n    {\"role\": \"user\", \"content\": \"Дякую, все зрозуміло\"}\n]\nepisode = create_episodic_record(past_session_messages)\nprint('Episodic record:', json.dumps(episode, ensure_ascii=False, indent=2))"}],"exercise":{"title":"Агент з episodic пам'яттю між сесіями","task":"Побудуй агента-репетитора що пам'ятає прогрес студента:\n1. Реалізуй SessionManager з методами:\n   - start_session(topic): ініціює сесію з завантаженням минулих епізодів\n   - end_session(messages): стискає сесію в episodic record і зберігає у файл\n   - get_context(): повертає стрядок з 2–3 останніх episodic records\n2. Проведи 3 симульованих сесії:\n   - Сесія 1: студент вивчає токени і питає про context window\n   - Сесія 2: студент повертається і питає 'що ми вчили минулого разу?'\n   - Сесія 3: студент питає 'що мені ще треба вивчити з LLM?'\n3. Переконайся що агент в сесіях 2 і 3 використовує минулі episodic records","hints":["Episodic records зберігай у JSON-файл як масив: кожна сесія — один об'єкт у масиві","start_session завантажує файл і передає get_context() результат в system prompt агента","В реальних системах end_session краще викликати навіть якщо сесія перервалась — зберігай часткові записи"]},"resources":[{"title":"MemGPT — агент з ієрархічною пам'яттю (стаття)","type":"article","url":"https://arxiv.org/abs/2310.08560"},{"title":"Anthropic — Context windows and long conversations","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/context-windows"}]}}]},{"id":6,"name":"MCP та інтеграції","lesson_count":2,"lessons":[{"id":20,"topic":"Model Context Protocol: архітектура та принципи","outcome":"Розумієш стандарт підключення джерел","instruction":{"description":"Model Context Protocol (MCP) — відкритий стандарт від Anthropic для підключення AI-агентів до зовнішніх джерел даних та інструментів. Замість написання унікального коду інтеграції для кожної пари агент–сервіс, MCP дає єдиний протокол: будь-який MCP-сервер автоматично сумісний з будь-яким MCP-клієнтом. Урок пояснює архітектуру MCP, три основні примітиви та транспортний рівень.","duration_minutes":90,"key_concepts":["MCP","MCP server","MCP client","resources","tools","prompts","stdio transport","JSON-RPC 2.0"],"theory":[{"title":"Проблема N×M та як MCP її вирішує","content":"До MCP кожна AI-система (Claude, Cursor, IDE-плагін) писала власний код для кожного джерела даних: файлова система, GitHub, Jira, Slack. N систем × M джерел = N×M унікальних інтеграцій. MCP розриває цю залежність: кожне джерело реалізує MCP-сервер один раз, кожна AI-система реалізує MCP-клієнт один раз. Тепер N+M реалізацій замість N×M. MCP — відкритий стандарт із відкритою специфікацією: будь-хто може реалізувати сумісний сервер або клієнт."},{"title":"Архітектура MCP: Host, Client, Server","content":"Три ролі в архітектурі: Host — середовище де живе AI (Claude Desktop, агент-скрипт, IDE). Client — компонент у хості що підтримує одне MCP-з'єднання (один хост може мати кілька клієнтів). Server — окремий процес що надає Resources, Tools і Prompts. Транспорт: stdio (стандартний для локальних серверів — хост запускає server як subprocess і спілкується через stdin/stdout), HTTP+SSE (для віддалених серверів). Протокол повідомлень: JSON-RPC 2.0 — той самий що використовується в Language Server Protocol (LSP)."},{"title":"Примітиви MCP: Resources, Tools, Prompts","content":"Resources — читабельні об'єкти що Claude може запросити: файли (file:///path/to/file), рядки БД (db://table/id), відповіді API. Аналог GET у HTTP — без побічних ефектів. Tools — викликані функції що виконують дії і повертають результат: write_file, run_query, send_message. Аналог POST. Prompts — шаблони повідомлень що сервер пропонує для типових сценаріїв. Claude бачить повний список Resources і Tools від усіх підключених серверів і сам вирішує що використати. Більшість практичних серверів реалізують лише Tools або лише Resources."}],"examples":[{"title":"Мінімальний MCP-сервер з інструментами та ресурсом","language":"python","code":"# pip install mcp\nfrom mcp.server.fastmcp import FastMCP\n\n# FastMCP — зручна обгортка над низькорівневим MCP SDK\nmcp = FastMCP(\"notes-server\")\n\n# Сховище нотаток (у реальному сервері — файл або БД)\n_notes: list[str] = []\n\n# Resource: Claude може прочитати список нотаток\n@mcp.resource(\"notes://all\")\ndef get_notes() -> str:\n    if not _notes:\n        return \"(порожньо)\"\n    return \"\\n\".join(f\"{i+1}. {note}\" for i, note in enumerate(_notes))\n\n# Tool: Claude може додати нотатку\n@mcp.tool()\ndef add_note(text: str) -> str:\n    \"\"\"Додає нову нотатку до списку.\"\"\"\n    _notes.append(text)\n    return f\"Нотатку збережено: {text}\"\n\n# Tool: Claude може очистити список\n@mcp.tool()\ndef clear_notes() -> str:\n    \"\"\"Видаляє всі нотатки.\"\"\"\n    count = len(_notes)\n    _notes.clear()\n    return f\"Видалено {count} нотаток.\"\n\nif __name__ == \"__main__\":\n    # Запуск у stdio-режимі: хост спілкується через stdin/stdout\n    mcp.run(transport=\"stdio\")"}],"exercise":{"title":"MCP-сервер для роботи з файлами","task":"Реалізуй MCP-сервер що дозволяє агенту читати та записувати текстові файли:\n1. Встанови: pip install mcp\n2. Створи файл file_server.py з FastMCP\n3. Додай Resource list://files що повертає список .txt файлів у поточній директорії\n4. Додай Resource file://{name} що повертає вміст конкретного файлу\n5. Додай Tool write_file(name, content) що створює або перезаписує файл\n6. Додай Tool append_to_file(name, line) що додає рядок у кінець файлу\n7. Запусти сервер і перевір що він стартує без помилок\n8. Документуй кожну функцію docstring — MCP передає їх Claude як опис інструменту","hints":["from pathlib import Path; list(Path('.').glob('*.txt')) — список txt-файлів у поточній директорії","FastMCP resource з параметром: @mcp.resource('file://{name}') def get_file(name: str) -> str:","Docstring функції стає описом tool/resource в MCP — чим точніший опис, тим краще Claude вибирає інструмент","mcp.run(transport='stdio') — стандартний запуск; для тестування: mcp dev file_server.py"]},"resources":[{"title":"Model Context Protocol — офіційна специфікація та вступ","type":"docs","url":"https://modelcontextprotocol.io/introduction"},{"title":"MCP Python SDK — FastMCP та приклади","type":"docs","url":"https://github.com/modelcontextprotocol/python-sdk"}]}},{"id":21,"topic":"Підключення MCP серверів до агента","outcome":"Агент читає файли, БД, API через MCP","instruction":{"description":"MCP-сервер сам по собі лише чекає з'єднань. Щоб агент міг його використовувати, потрібно підключити клієнта і передати список доступних інструментів у запит до Claude. Бібліотека mcp для Python надає ClientSession та stdio_client для підключення до локальних серверів. Урок показує повний цикл: запуск MCP-сервера → з'єднання → отримання tools → agentic loop з tool_use.","duration_minutes":90,"key_concepts":["MCP client","ClientSession","stdio_client","tool listing","tool execution","tool_use loop","async context manager"],"theory":[{"title":"Цикл запит–відповідь з MCP","content":"Повний цикл роботи агента з MCP-сервером: (1) Запуск — хост запускає MCP-сервер як subprocess і встановлює stdio-з'єднання. (2) Ініціалізація — client і server обмінюються initialize/initialized повідомленнями, сервер повідомляє свої можливості. (3) Listing — клієнт отримує список Tools і Resources від сервера. (4) Запит до Claude — tools передаються у параметр tools API у форматі {name, description, input_schema}. (5) tool_use loop — якщо Claude повертає tool_use, клієнт виконує відповідний MCP call і повертає результат. (6) Фінальна відповідь — Claude формує текст після отримання всіх результатів."},{"title":"mcp.ClientSession: підключення до stdio сервера","content":"Бібліотека mcp надає два контекстні менеджери: stdio_client(params) — запускає subprocess і повертає (read, write) потоки; ClientSession(read, write) — реалізує MCP протокол поверх цих потоків. Після await session.initialize() сесія готова. session.list_tools() повертає список tool-об'єктів з полями name, description, inputSchema. Їх потрібно конвертувати у формат anthropic: {\"name\": ..., \"description\": ..., \"input_schema\": ...}. session.call_tool(name, arguments) виконує інструмент і повертає об'єкт з полем content."},{"title":"Практичні патерни: ізоляція та безпека","content":"MCP-сервери запускаються в окремих процесах — це природна ізоляція. Важливі патерни: (1) Найменші привілеї — кожен сервер надає тільки ті Tools що потрібні для задачі. (2) Валідація вхідних даних у Tool functions — Claude може передати несподіваний аргумент, завжди перевіряй. (3) Read-only першочергово — якщо агент не потребує запису, не надавай write-tools. (4) Логування всіх tool calls — у production завжди записуй що агент виконував. (5) Обробка помилок — Tool function має повертати текстове повідомлення про помилку замість викидати виняток, щоб Claude міг адаптувати поведінку."}],"examples":[{"title":"Агент підключений до MCP file_server через ClientSession","language":"python","code":"# pip install anthropic mcp\n# Передумова: file_server.py з попереднього уроку\n\nimport asyncio\nimport anthropic\nfrom mcp import ClientSession, StdioServerParameters\nfrom mcp.client.stdio import stdio_client\n\nclient = anthropic.Anthropic()\n\nasync def run_agent():\n    server_params = StdioServerParameters(\n        command=\"python\",\n        args=[\"file_server.py\"]\n    )\n\n    async with stdio_client(server_params) as (read, write):\n        async with ClientSession(read, write) as session:\n            await session.initialize()\n\n            # Отримуємо список tools від MCP сервера\n            tools_resp = await session.list_tools()\n\n            # Конвертуємо у формат Anthropic\n            tools = [\n                {\n                    \"name\": t.name,\n                    \"description\": t.description or \"\",\n                    \"input_schema\": t.inputSchema,\n                }\n                for t in tools_resp.tools\n            ]\n\n            messages = [{\"role\": \"user\", \"content\": \"Перелічи .txt файли і прочитай перший\"}]\n\n            # Agentic loop\n            while True:\n                response = client.messages.create(\n                    model=\"claude-sonnet-4-6\",\n                    max_tokens=1024,\n                    tools=tools,\n                    messages=messages,\n                )\n\n                messages.append({\"role\": \"assistant\", \"content\": response.content})\n\n                if response.stop_reason == \"end_turn\":\n                    break\n\n                if response.stop_reason == \"tool_use\":\n                    tool_results = []\n                    for block in response.content:\n                        if block.type == \"tool_use\":\n                            print(f\"Tool call: {block.name}({block.input})\")\n                            result = await session.call_tool(block.name, block.input)\n                            content = result.content[0].text if result.content else \"\"\n                            tool_results.append({\n                                \"type\": \"tool_result\",\n                                \"tool_use_id\": block.id,\n                                \"content\": content,\n                            })\n                    messages.append({\"role\": \"user\", \"content\": tool_results})\n\n            # Фінальна відповідь\n            for block in response.content:\n                if hasattr(block, \"text\"):\n                    print(block.text)\n\nasyncio.run(run_agent())"}],"exercise":{"title":"Агент-аналітик даних через MCP","task":"Побудуй систему з двох компонентів — MCP-сервер для CSV і агент що аналізує дані:\n1. Створи data_server.py з FastMCP і трьома Tools:\n   - list_csv_files(): повертає список .csv файлів у поточній директорії\n   - read_csv_summary(filename): повертає перші 5 рядків і загальну кількість рядків\n   - get_column_stats(filename, column): min, max, середнє для числової колонки\n2. Створи sales.csv з колонками date, product, amount (мінімум 10 рядків, різні продукти)\n3. Напиши агента що відповідає на питання: \"Який продукт мав найвищий сумарний amount?\"\n4. Переконайся що агент робить кілька tool calls: список → зміст → статистика\n5. Додай print-логування кожного tool call на стороні сервера","hints":["import csv; rows = list(csv.DictReader(open(filename))) — читання CSV як список словників","Для статистики: values = [float(r[column]) for r in rows]; min(values), max(values), sum(values)/len(values)","Якщо файл не знайдено — повертай рядок з помилкою замість raise: return f'Помилка: файл {filename} не знайдено'","Логуй tool calls на стороні сервера (всередині Tool функції) — так бачиш що Claude насправді запитує"]},"resources":[{"title":"Anthropic Docs — MCP для агентів","type":"docs","url":"https://docs.anthropic.com/en/docs/agents-and-tools/mcp"},{"title":"MCP Quickstart: Python сервер","type":"docs","url":"https://modelcontextprotocol.io/quickstart/server"}]}}]},{"id":7,"name":"Фреймворки","lesson_count":4,"lessons":[{"id":22,"topic":"LangGraph: вузли, ребра, граф стану","outcome":"Будуєш агентний граф у LangGraph","instruction":{"description":"LangGraph — бібліотека від LangChain Inc. для побудови агентів у вигляді орієнтованих графів зі станом. Вузли — це Python-функції що трансформують стан, ребра — переходи між ними. Урок пояснює базові примітиви: StateGraph, TypedDict-стан, редуктори, компіляція і запуск графа з Claude як мозком.","duration_minutes":90,"key_concepts":["LangGraph","StateGraph","node","edge","TypedDict","Annotated","add_messages","CompiledGraph"],"theory":[{"title":"LangGraph та граф як агент","content":"LangGraph будує агента як орієнтований граф: вузли (nodes) — це Python-функції що читають стан і повертають оновлення; ребра (edges) — явні переходи між вузлами. На відміну від простого agentic loop (while True: response = client.messages.create(...)), граф дає чіткий візуальний і структурний контроль потоку. Спеціальні вузли START і END позначають вхід і вихід. Граф компілюється один раз і потім викликається як звичайна функція."},{"title":"Стан та редуктори","content":"Стан графа — це TypedDict, що всі вузли спільно читають і модифікують. Кожен вузол повертає не весь стан, а лише дельту — dict з полями що потрібно оновити. LangGraph merge-ить оновлення через редуктори: за замовчуванням — перезапис значення; `Annotated[list, operator.add]` — накопичення (append); `add_messages` — спеціальний merge для повідомлень що видаляє дублікати за id. Це дозволяє різним вузлам додавати до одного списку незалежно."},{"title":"Компіляція та запуск","content":"Для побудови графа: `graph = StateGraph(MyState)` → `graph.add_node('name', fn)` → `graph.add_edge('from', 'to')` → `graph.set_entry_point('first')` → `app = graph.compile()`. Для запуску: `app.invoke({'field': value})` — повертає фінальний стан; `app.stream({'field': value})` — генератор що видає стан після кожного вузла. `app.get_graph().draw_mermaid()` генерує Mermaid-діаграму графа для документації."}],"examples":[{"title":"Три-вузловий агент: plan → execute → summarize","language":"python","code":"# pip install langgraph anthropic\nfrom langgraph.graph import StateGraph, END\nfrom typing import TypedDict, Annotated\nimport operator\nimport anthropic\n\nclient = anthropic.Anthropic()\n\nclass AgentState(TypedDict):\n    task: str\n    plan: str\n    result: str\n    messages: Annotated[list, operator.add]\n\ndef plan_node(state: AgentState) -> dict:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=200,\n        system=\"Ти планувальник. Склади короткий план (3 кроки) для задачі.\",\n        messages=[{\"role\": \"user\", \"content\": state[\"task\"]}]\n    )\n    plan = resp.content[0].text\n    return {\"plan\": plan, \"messages\": [f\"PLAN: {plan}\"]}\n\ndef execute_node(state: AgentState) -> dict:\n    prompt = f\"Задача: {state['task']}\\nПлан: {state['plan']}\\nВиконай задачу.\"\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=400,\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    result = resp.content[0].text\n    return {\"result\": result, \"messages\": [f\"RESULT: {result[:80]}...\"]}\n\ndef summarize_node(state: AgentState) -> dict:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=100,\n        system=\"Дай одне речення-підсумок.\",\n        messages=[{\"role\": \"user\", \"content\": state[\"result\"]}]\n    )\n    summary = resp.content[0].text\n    return {\"messages\": [f\"SUMMARY: {summary}\"]}\n\n# Будуємо граф\ngraph = StateGraph(AgentState)\ngraph.add_node(\"plan\", plan_node)\ngraph.add_node(\"execute\", execute_node)\ngraph.add_node(\"summarize\", summarize_node)\n\ngraph.set_entry_point(\"plan\")\ngraph.add_edge(\"plan\", \"execute\")\ngraph.add_edge(\"execute\", \"summarize\")\ngraph.add_edge(\"summarize\", END)\n\napp = graph.compile()\n\n# Запуск\nresult = app.invoke({\"task\": \"Поясни що таке embeddings\", \"plan\": \"\", \"result\": \"\", \"messages\": []})\nprint(\"\\nПовідомлення з кожного вузла:\")\nfor msg in result[\"messages\"]:\n    print(\" -\", msg)"}],"exercise":{"title":"Дослідницький агент у LangGraph","task":"Побудуй LangGraph-агента для дослідження теми:\n1. Визнач стан: topic (str), questions (list[str]), answers (list[str]), report (str)\n2. Вузол generate_questions: генерує 3 питання для дослідження теми\n3. Вузол answer_questions: для кожного питання генерує відповідь (використовуй Claude)\n4. Вузол write_report: складає фінальний звіт з питань і відповідей\n5. З'єднай вузли лінійно: generate_questions → answer_questions → write_report → END\n6. Запусти з темою 'Що таке векторні бази даних?'\n7. Виведи фінальний звіт","hints":["Для answer_questions: ітеруй по state['questions'], для кожного питання виклич client.messages.create і збери відповіді","add_edge(START, 'first_node') — альтернатива set_entry_point, якщо імпортуєш START з langgraph.graph","app.stream(initial_state) дає змогу бачити що відбувається в кожному вузлі: for step in app.stream(...): print(step)"]},"resources":[{"title":"LangGraph — офіційна документація та туторіали","type":"docs","url":"https://langchain-ai.github.io/langgraph/"},{"title":"LangGraph Quickstart — побудова першого агента","type":"docs","url":"https://langchain-ai.github.io/langgraph/tutorials/introduction/"}]}},{"id":23,"topic":"LangGraph: умовний routing та checkpoints","outcome":"Складна логіка розгалуження","instruction":{"description":"Умовні ребра дозволяють графу приймати рішення в runtime: залежно від стану перейти до різних вузлів. Checkpoints зберігають стан між запусками — агент може продовжити з будь-якої точки або реалізувати human-in-the-loop. Урок показує add_conditional_edges, MemorySaver і thread_id.","duration_minutes":90,"key_concepts":["conditional_edge","router function","MemorySaver","SqliteSaver","thread_id","checkpointer","interrupt_before","human-in-the-loop"],"theory":[{"title":"Умовний routing: граф з розгалуженням","content":"Умовне ребро: `graph.add_conditional_edges('node', router_fn, {'key': 'target_node'})`. Функція router_fn отримує стан і повертає рядок-ключ. Ключ маппиться на наступний вузол через словник. Якщо словника немає — router_fn повертає ім'я вузла напряму. Зазвичай router перевіряє одне поле стану (наприклад `state['next']` або `state['stop_reason']`) і повертає відповідний ключ. END є валідним значенням — граф зупиняється."},{"title":"Checkpointer: персистентність між запусками","content":"Checkpointer зберігає стан після кожного вузла. MemorySaver — RAM-сховище для розробки і тестів. SqliteSaver — файлове сховище для production. Підключення: `app = graph.compile(checkpointer=MemorySaver())`. Ідентифікація розмови через `config = {\"configurable\": {\"thread_id\": \"user-123\"}}`. Перший виклик `app.invoke(state, config)` — починає розмову; наступний з тим самим thread_id — продовжує з точки де зупинився. `app.get_state(config)` повертає поточний збережений стан."},{"title":"Human-in-the-loop через interrupt","content":"LangGraph дозволяє зупинити граф перед або після вузла для людської перевірки. `app = graph.compile(checkpointer=memory, interrupt_before=['sensitive_node'])`. Перший invoke виконується до точки interrupt і повертає проміжний стан. Людина перевіряє стан через `app.get_state(config)`, опційно змінює через `app.update_state(config, new_values)`. Продовження: `app.invoke(None, config)` — None означає 'продовжи з checkpoint'. Патерн застосовується для: підтвердження перед відправкою, перегляду плану перед виконанням, аудит-trail."}],"examples":[{"title":"Агент з routing за типом запиту і checkpoint між сесіями","language":"python","code":"# pip install langgraph anthropic\nfrom langgraph.graph import StateGraph, END\nfrom langgraph.checkpoint.memory import MemorySaver\nfrom typing import TypedDict, Annotated\nimport operator\nimport anthropic\n\nclient = anthropic.Anthropic()\n\nclass State(TypedDict):\n    messages: Annotated[list, operator.add]\n    query_type: str  # 'research' | 'code' | 'other'\n\ndef classify_node(state: State) -> dict:\n    last_msg = state[\"messages\"][-1]\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=10,\n        system=\"Відповідай одним словом: 'research', 'code' або 'other'.\",\n        messages=[{\"role\": \"user\", \"content\": f\"Тип запиту: {last_msg}\"}]\n    )\n    qtype = resp.content[0].text.strip().lower()\n    if qtype not in (\"research\", \"code\"):\n        qtype = \"other\"\n    return {\"query_type\": qtype}\n\ndef research_node(state: State) -> dict:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=300,\n        system=\"Ти дослідник. Дай інформативну відповідь.\",\n        messages=[{\"role\": \"user\", \"content\": state[\"messages\"][-1]}]\n    )\n    return {\"messages\": [\"[Research] \" + resp.content[0].text]}\n\ndef code_node(state: State) -> dict:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=300,\n        system=\"Ти програміст. Дай код-відповідь.\",\n        messages=[{\"role\": \"user\", \"content\": state[\"messages\"][-1]}]\n    )\n    return {\"messages\": [\"[Code] \" + resp.content[0].text]}\n\ndef other_node(state: State) -> dict:\n    return {\"messages\": [\"[Other] Будь ласка, уточни запит.\"]}\n\ndef router(state: State) -> str:\n    return state[\"query_type\"]\n\n# Граф\nmemory = MemorySaver()\ngraph = StateGraph(State)\ngraph.add_node(\"classify\", classify_node)\ngraph.add_node(\"research\", research_node)\ngraph.add_node(\"code\", code_node)\ngraph.add_node(\"other\", other_node)\n\ngraph.set_entry_point(\"classify\")\ngraph.add_conditional_edges(\"classify\", router, {\n    \"research\": \"research\",\n    \"code\": \"code\",\n    \"other\": \"other\",\n})\nfor node in (\"research\", \"code\", \"other\"):\n    graph.add_edge(node, END)\n\napp = graph.compile(checkpointer=memory)\n\n# Перший запит\nconfig = {\"configurable\": {\"thread_id\": \"demo\"}}\ninitial = {\"messages\": [\"Як працює cosine similarity?\"], \"query_type\": \"\"}\nresult = app.invoke(initial, config)\nprint(result[\"messages\"][-1])\n\n# Другий запит у тій самій сесії (thread продовжується)\nresult2 = app.invoke({\"messages\": [\"Напиши функцію cosine_sim на Python\"], \"query_type\": \"\"}, config)\nprint(result2[\"messages\"][-1])"}],"exercise":{"title":"Агент з людським підтвердженням через interrupt","task":"Побудуй агента з обов'язковим підтвердженням перед 'небезпечною' дією:\n1. Стан: task (str), plan (str), approved (bool), result (str)\n2. Вузол make_plan: генерує план виконання задачі\n3. Вузол execute: виконує задачу (симулюй: просто виводь 'Виконую: {plan}')\n4. Налаштуй interrupt_before=['execute']\n5. Перший invoke: граф зупиниться після make_plan\n6. Виведи план через app.get_state(config).values['plan']\n7. Якщо план OK — виклич app.invoke(None, config) для продовження\n8. Якщо план не OK — виклич app.update_state(config, {'plan': 'новий план'}) перед continue","hints":["interrupt_before і interrupt_after приймають список імен вузлів: compile(checkpointer=memory, interrupt_before=['execute'])","app.get_state(config) повертає StateSnapshot з полями values (стан), next (наступні вузли), metadata","app.invoke(None, config) — перший аргумент None означає 'не додавати нових вхідних даних, продовжити з checkpoint'"]},"resources":[{"title":"LangGraph — Persistence та checkpoints","type":"docs","url":"https://langchain-ai.github.io/langgraph/concepts/persistence/"},{"title":"LangGraph — Human-in-the-loop туторіал","type":"docs","url":"https://langchain-ai.github.io/langgraph/tutorials/introduction/#part-3-adding-memory-to-the-chatbot"}]}},{"id":24,"topic":"Claude Agents SDK: нативна інтеграція","outcome":"Агенти з subagents через Anthropic SDK","instruction":{"description":"Anthropic Python SDK — найпряміший шлях до мультиагентних систем без зовнішніх фреймворків. Оркестратор і субагенти — це окремі виклики client.messages.create зі специфічними system prompt і набором інструментів. Урок показує як реалізувати orchestrator-subagent архітектуру засобами чистого Anthropic SDK через tool_use.","duration_minutes":90,"key_concepts":["tool_use","subagent","orchestrator","system prompt","agent loop","tool_result","parallel subagents","Anthropic SDK"],"theory":[{"title":"SDK без фреймворку — коли це правильний вибір","content":"Anthropic SDK дає повний контроль: жодного overhead, всі нові Claude-фічі (extended thinking, prompt caching, streaming) без обмежень фреймворку. Ідеальний вибір для: прототипів де важлива швидкість старту, production де кожна мілісекунда важлива, специфічних патернів координації що не вписуються в готові фреймворки. Фреймворк (LangGraph, CrewAI) виправданий коли потрібен: візуальний граф стану, вбудована персистентність, велика community і готові інтеграції."},{"title":"Subagent через tool_use","content":"Субагент — це Claude-виклик з вузьким system prompt і специфічним набором інструментів для однієї задачі. Оркестратор взаємодіє з субагентами через tool_use: (1) Визначаємо tool з input_schema в оркестраторі; (2) Claude оркестратор повертає tool_use-блок з аргументами; (3) Виконуємо call_subagent(name, args) → окремий client.messages.create; (4) Повертаємо результат як tool_result і продовжуємо agentic loop. Субагент не знає про оркестратора — він просто отримує конкретне завдання."},{"title":"Паралельні субагенти","content":"Якщо оркестратор повертає кілька tool_use блоків за один хід — запускаємо їх паралельно. В синхронному коді: ThreadPoolExecutor з futures. В асинхронному: asyncio.gather. Потім збираємо всі tool_result в один масив і продовжуємо agentic loop одним викликом. Паралельність виправдана лише коли задачі незалежні — якщо субагент B потребує результату субагента A, паралельний запуск дасть неправильний результат. Логуй кожен субагент-виклик: так легше діагностувати де виникла помилка."}],"examples":[{"title":"Оркестратор з researcher і coder субагентами","language":"python","code":"import anthropic\n\nclient = anthropic.Anthropic()\n\n# Субагент-дослідник\ndef researcher_agent(topic: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=300,\n        system=\"Ти дослідник. Дай стислий огляд теми з ключовими фактами.\",\n        messages=[{\"role\": \"user\", \"content\": f\"Дослідь: {topic}\"}]\n    )\n    return resp.content[0].text\n\n# Субагент-програміст\ndef coder_agent(task: str) -> str:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=400,\n        system=\"Ти Python-розробник. Пиши чистий, робочий код з коментарями.\",\n        messages=[{\"role\": \"user\", \"content\": task}]\n    )\n    return resp.content[0].text\n\n# Оркестратор з двома інструментами\norchestrator_tools = [\n    {\n        \"name\": \"research_topic\",\n        \"description\": \"Досліджує тему і повертає огляд з ключовими фактами\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\"topic\": {\"type\": \"string\", \"description\": \"Тема для дослідження\"}},\n            \"required\": [\"topic\"]\n        }\n    },\n    {\n        \"name\": \"write_code\",\n        \"description\": \"Пише Python-код для вирішення задачі\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\"task\": {\"type\": \"string\", \"description\": \"Задача для реалізації\"}},\n            \"required\": [\"task\"]\n        }\n    }\n]\n\ndef run_orchestrator(user_request: str) -> str:\n    messages = [{\"role\": \"user\", \"content\": user_request}]\n    \n    while True:\n        resp = client.messages.create(\n            model=\"claude-sonnet-4-6\",\n            max_tokens=1024,\n            system=\"Ти оркестратор. Для відповіді використовуй research_topic і write_code.\",\n            tools=orchestrator_tools,\n            messages=messages,\n        )\n        messages.append({\"role\": \"assistant\", \"content\": resp.content})\n        \n        if resp.stop_reason == \"end_turn\":\n            for block in resp.content:\n                if hasattr(block, \"text\"):\n                    return block.text\n        \n        tool_results = []\n        for block in resp.content:\n            if block.type == \"tool_use\":\n                print(f\"  -> Subagent: {block.name}({list(block.input.values())[0][:50]}...)\")\n                if block.name == \"research_topic\":\n                    result = researcher_agent(block.input[\"topic\"])\n                elif block.name == \"write_code\":\n                    result = coder_agent(block.input[\"task\"])\n                else:\n                    result = \"Unknown tool\"\n                tool_results.append({\n                    \"type\": \"tool_result\",\n                    \"tool_use_id\": block.id,\n                    \"content\": result,\n                })\n        messages.append({\"role\": \"user\", \"content\": tool_results})\n\nprint(run_orchestrator(\n    \"Дослідь що таке cosine similarity і напиши функцію для її обчислення на Python\"\n))"}],"exercise":{"title":"Тричастинний оркестратор: research → write → review","task":"Побудуй оркестратора з трьома субагентами для створення технічної статті:\n1. Визнач три tools для оркестратора: run_researcher(topic), run_writer(research_notes), run_reviewer(article)\n2. Реалізуй кожен субагент як окрему функцію з вузьким system prompt:\n   - researcher: повертає структуровані нотатки з 5 ключових фактів\n   - writer: перетворює нотатки на статтю 150-200 слів\n   - reviewer: перевіряє статтю і повертає покращену версію + список змін\n3. Оркестратор повинен послідовно викликати всі три субагенти\n4. Виведи фінальну статтю і список змін від reviewer\n5. Додай логування: для кожного tool_use виводь назву субагента і перші 60 символів аргументу","hints":["Кожен субагент отримує вузький system prompt — чим конкретніший ролі, тим кращий результат","Оркестратор сам вирішить послідовність: не треба примушувати — просто опиши в system prompt що є три фази","ThreadPoolExecutor(max_workers=3) + futures — для паралельного запуску незалежних субагентів якщо захочеш прискорити"]},"resources":[{"title":"Anthropic — Orchestration and subagents","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Anthropic Docs — Tool use (function calling)","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use"}]}},{"id":25,"topic":"CrewAI: role-based агенти","outcome":"Швидкий запуск командних систем","instruction":{"description":"CrewAI — фреймворк для швидкого прототипування командних агентних систем. Агенти визначаються через role, goal і backstory; завдання — через description та expected_output. Sequential process запускає задачі послідовно, hierarchical — через crew manager. Урок показує від нуля до працюючого crew за 30 рядків.","duration_minutes":90,"key_concepts":["Crew","Agent","Task","Process.sequential","Process.hierarchical","role","goal","backstory","tools","kickoff"],"theory":[{"title":"Концепція CrewAI: ролі, задачі, команда","content":"Три базові примітиви CrewAI: Agent — автономний виконавець з роллю (role: 'Дослідник'), ціллю (goal: 'Знаходити актуальні факти') і контекстом (backstory: 'Ти аналітик з 10-річним досвідом'). Task — конкретне завдання з description (що зробити), expected_output (формат результату) і agent (хто виконує). Crew — оркестратор що з'єднує агентів і задачі через заданий process. `crew.kickoff()` запускає виконання і повертає фінальний результат."},{"title":"Process.sequential vs Process.hierarchical","content":"Sequential: задачі виконуються по черзі у визначеному порядку; результат попередньої задачі доступний наступній через `context=[prev_task]`. Hierarchical: crew автоматично створює manager-агента (Claude або GPT) що планує і розподіляє задачі між іншими агентами. Sequential підходить для лінійних pipeline (дослідження → написання → редактура). Hierarchical — для динамічних задач де менеджер сам вирішує хто і що робить. Починай з sequential — простіше відлагоджувати і передбачати."},{"title":"LLM та інструменти в CrewAI","content":"За замовчуванням CrewAI використовує OpenAI GPT. Для Claude: `from crewai import LLM; llm = LLM(model='claude-sonnet-4-6')` і передай агенту через `llm=llm`. Агентам можна призначати tools: `from crewai_tools import SerperDevTool; agent = Agent(..., tools=[SerperDevTool()])`. `verbose=True` у Crew виводить детальний лог кожного агента і задачі — незамінно для дебагу. `memory=True` вмикає вбудовану пам'ять між задачами."}],"examples":[{"title":"Crew з дослідника та автора для технічного огляду","language":"python","code":"# pip install crewai\nfrom crewai import Agent, Task, Crew, Process, LLM\n\n# Використовуємо Claude замість GPT\nllm = LLM(model=\"claude-haiku-4-5-20251001\")\n\n# Агент 1: дослідник\nresearcher = Agent(\n    role=\"Технічний дослідник\",\n    goal=\"Зібрати точні технічні факти та приклади використання\",\n    backstory=\"Ти досвідчений технічний аналітик що вміє пояснювати складні концепції просто\",\n    llm=llm,\n    verbose=False\n)\n\n# Агент 2: автор\nwriter = Agent(\n    role=\"Технічний автор\",\n    goal=\"Писати зрозумілі та структуровані технічні огляди\",\n    backstory=\"Ти автор що перетворює технічні факти на читабельний контент для розробників\",\n    llm=llm,\n    verbose=False\n)\n\n# Задача 1: дослідження\nresearch_task = Task(\n    description=\"Дослідь тему '{topic}' і збери 5 ключових фактів з прикладами\",\n    expected_output=\"Нумерований список з 5 фактів, кожен з конкретним прикладом\",\n    agent=researcher\n)\n\n# Задача 2: написання статті (використовує результат research_task)\nwrite_task = Task(\n    description=\"Напиши технічний огляд на основі наданих фактів. Обсяг: 150-200 слів.\",\n    expected_output=\"Готова стаття з вступом, 3 параграфами та висновком\",\n    agent=writer,\n    context=[research_task]  # отримує результат дослідження\n)\n\n# Crew з sequential process\ncrew = Crew(\n    agents=[researcher, writer],\n    tasks=[research_task, write_task],\n    process=Process.sequential,\n    verbose=True\n)\n\nresult = crew.kickoff(inputs={\"topic\": \"LangGraph\"})\nprint(\"\\n=== Фінальна стаття ===\")\nprint(result.raw)"}],"exercise":{"title":"Редакційна команда CrewAI","task":"Побудуй editorial crew з трьох агентів для випуску технічного контенту:\n1. Агент researcher: збирає 5 фактів по темі\n2. Агент writer: пише статтю 200 слів на основі фактів\n3. Агент editor: перевіряє текст, виправляє і повертає фінальну версію + список змін\n4. Три Sequential задачі: research_task → write_task → edit_task\n5. edit_task отримує context=[write_task]\n6. Запусти crew з темою 'Multiagent Systems'\n7. Перевір що editor дійсно отримав текст writer (виведи edit_task.output)","hints":["task.output.raw або result.tasks_output[i].raw — доступ до результату конкретної задачі після kickoff","Якщо хочеш побачити деталі — став verbose=True у Crew, а не у кожному Agent окремо","llm=LLM(model='claude-haiku-4-5-20251001') — швидший і дешевший для навчальних прикладів; claude-sonnet-4-6 для production"]},"resources":[{"title":"CrewAI — офіційна документація","type":"docs","url":"https://docs.crewai.com/introduction"},{"title":"CrewAI — Quickstart і перший crew","type":"docs","url":"https://docs.crewai.com/quickstart"}]}}]},{"id":8,"name":"Надійність та production","lesson_count":4,"lessons":[{"id":26,"topic":"Тестування: LLM-as-judge та evaluation harness","outcome":"Автоматична оцінка якості агентів","instruction":{"description":"Традиційні unit-тести порівнюють точні рядки — для LLM-виходів це не працює через недетермінованість. LLM-as-judge вирішує задачу: окремий виклик Claude оцінює відповідь агента за рубрикою і повертає score та обґрунтування. Поєднання з evaluation harness дає систему автоматичних регресійних тестів що замінює ручний QA.","duration_minutes":90,"key_concepts":["LLM-as-judge","evaluation harness","rubric","score","golden dataset","regression testing","automated evaluation","benchmark"],"theory":[{"title":"Чому unit-тести не підходять для агентів","content":"LLM-виходи недетерміновані: одна й та сама правильна відповідь може мати десятки формулювань. assertEqual('Столиця Франції — Париж', agent_answer) провалиться навіть якщо агент відповів 'Париж є столицею Франції'. Крім того, якість відповіді — це не binary pass/fail: відповідь може бути частково правильною, неповною або правильною але невідповідного тону. Потрібна семантична оцінка, а не точне порівняння рядків."},{"title":"LLM-as-judge: автоматична семантична оцінка","content":"Суддя-модель (зазвичай потужніша за агента що тестується) отримує: запит користувача, відповідь агента, критерії оцінки (рубрику). Повертає числовий score (1–5 або 0/1) і reasoning — пояснення оцінки. Переваги: масштабований (тисячі тестів за хвилину), дешевший за human review, послідовний у застосуванні рубрики. Недолік: суддя сам може помилятись — калібруй рубрику на прикладах де людина-оцінювач і LLM-суддя погоджуються."},{"title":"Evaluation harness: система регресійних тестів","content":"Harness = golden dataset + runner + reporter. Golden dataset — набір (input, criteria) пар де criteria описує що повинна містити правильна відповідь. Runner запускає агента на кожному input і передає результат судді. Reporter агрегує: avg_score, pass_rate (частка оцінок ≥ поріг), деталі по кожному кейсу. Інтегруй harness у CI: якщо pass_rate падає нижче 0.8 — деплой блокується. Оновлюй golden dataset коли знаходиш нові edge cases."}],"examples":[{"title":"LLM-as-judge та evaluation harness для агента відповідей","language":"python","code":"import anthropic\nimport json\n\nclient = anthropic.Anthropic()\n\ndef agent_answer(question: str) -> str:\n    \"\"\"Простий агент що відповідає на питання.\"\"\"\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=200,\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\n    return resp.content[0].text\n\ndef llm_judge(question: str, answer: str, criteria: str) -> tuple[int, str]:\n    \"\"\"Оцінює відповідь за рубрикою. Повертає (score 1-5, reasoning).\"\"\"\n    prompt = f\"\"\"Оціни відповідь за шкалою 1-5.\n\nПитання: {question}\nВідповідь: {answer}\nКритерії оцінки: {criteria}\n\nПоверни JSON: {{\"score\": <1-5>, \"reasoning\": \"<пояснення>\"}}.\nТільки JSON, без додаткового тексту.\"\"\"\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=150,\n        messages=[{\"role\": \"user\", \"content\": prompt}]\n    )\n    try:\n        data = json.loads(resp.content[0].text.strip())\n        return data[\"score\"], data[\"reasoning\"]\n    except Exception:\n        return 1, \"Не вдалось розпарсити відповідь судді\"\n\n# Golden dataset: (питання, критерії якості)\ntest_cases = [\n    (\n        \"Що таке векторна база даних?\",\n        \"Відповідь повинна пояснити що таке embeddings і семантичний пошук\"\n    ),\n    (\n        \"Поясни різницю між синхронним і асинхронним кодом в Python\",\n        \"Відповідь повинна згадати async/await і навести практичний приклад\"\n    ),\n    (\n        \"Що таке MCP?\",\n        \"Відповідь повинна згадати Model Context Protocol і його призначення\"\n    ),\n]\n\n# Запуск evaluation harness\nPASS_THRESHOLD = 3  # score >= 3 вважається PASS\nresults = []\n\nfor i, (question, criteria) in enumerate(test_cases, 1):\n    answer = agent_answer(question)\n    score, reasoning = llm_judge(question, answer, criteria)\n    passed = score >= PASS_THRESHOLD\n    results.append({\"id\": i, \"score\": score, \"passed\": passed, \"reasoning\": reasoning})\n    print(f\"Test {i}: score={score}/5 {'PASS' if passed else 'FAIL'} — {reasoning[:60]}...\")\n\n# Підсумок\npass_rate = sum(1 for r in results if r[\"passed\"]) / len(results)\navg_score = sum(r[\"score\"] for r in results) / len(results)\nprint(f\"\\nРезультат: pass_rate={pass_rate:.0%}, avg_score={avg_score:.1f}/5\")\nprint(\"Деплой:\", \"ДОЗВОЛЕНО\" if pass_rate >= 0.8 else \"ЗАБЛОКОВАНО\")"}],"exercise":{"title":"Evaluation harness для агента-summarizer","task":"Побудуй систему тестування агента що стискає тексти:\n1. Реалізуй summarizer_agent(text, max_words=50) — агент що стискає текст до N слів\n2. Склади golden dataset з 5 тест-кейсів: різні тексти з різними критеріями\n   - Науковий текст: 'стислий переказ зберігає ключові факти'\n   - Новинна стаття: 'відповідь містить хто, що, коли'\n   - Технічна документація: 'згадані всі ключові API методи'\n3. Реалізуй rubric-based суддю: окремі критерії для brevity, accuracy, completeness\n4. Запусти harness і виведи деталізований звіт\n5. Знайди тест-кейс де агент отримав найнижчу оцінку і поясни чому","hints":["Окремий суддя для кожного критерію дає кращу деталізацію ніж загальна оцінка","Додай до golden dataset 'expected_keywords' — список слів що ПОВИННІ з'явитись у summary","Щоб зробити harness відтворюваним — зберігай всі відповіді агента і оцінки судді у JSON файл"]},"resources":[{"title":"Anthropic — Evaluation and testing for LLM applications","type":"article","url":"https://www.anthropic.com/research/building-effective-agents"},{"title":"Anthropic Docs — Промпти для оцінки якості","type":"docs","url":"https://docs.anthropic.com/en/docs/test-and-evaluate/strengthen-guardrails/llm-as-a-judge"}]}},{"id":27,"topic":"Observability: трасування кожного кроку","outcome":"Бачиш, що робить агент всередині","instruction":{"description":"Агент робить десятки кроків між запитом і відповіддю: виклики моделі, tool_use, зовнішні запити. Без structured трасування неможливо зрозуміти де виникла помилка, скільки коштував запит і де втрачається час. Урок показує мінімальний підхід до observability через structured logging та огляд готових інструментів Langfuse і LangSmith.","duration_minutes":90,"key_concepts":["tracing","span","structured logging","token usage","latency","trace_id","Langfuse","LangSmith"],"theory":[{"title":"Що потрібно трасувати в агенті","content":"Кожен виклик моделі: input_tokens, output_tokens, latency_ms, model_name, stop_reason. Кожен tool_use: назва інструменту, вхідні аргументи, час виконання, результат або помилка. Загальний запит: total_tokens, estimated_cost, wall_time, success/error, user_id. Без цих даних неможливо: знайти де агент 'застрягає', порахувати реальну вартість, відтворити баг з production. Починай логувати з першого дня — набагато простіше додати трасування на старті ніж retrofit у production."},{"title":"Structured logging: мінімальний підхід без залежностей","content":"Обгортай client.messages.create у thin wrapper що логує до і після виклику. Логуй у JSON (а не plain text) — легко парсити, фільтрувати і агрегувати. Зберігай trace_id (UUID) що з'єднує всі кроки одного запиту — без нього неможливо відновити послідовність подій. Стандартний logging модуль Python з JSON formatter — достатньо для MVP. Для виведення у stdout: json.dumps(log_entry) — сумісно з будь-яким log aggregator (Datadog, CloudWatch, ELK)."},{"title":"Зовнішні інструменти: Langfuse і LangSmith","content":"Langfuse: open-source, self-hosted або хмарна версія, SDK для Python і TypeScript. Автоматично захоплює traces LangChain, LlamaIndex, OpenAI-сумісних клієнтів. Надає: cost tracking, latency percentiles, trace explorer, prompt versioning. LangSmith: від LangChain Inc., тісна інтеграція з LangGraph і LangChain — якщо вже використовуєш ці фреймворки, LangSmith підключається в 2 рядки. Обидва підтримують аномалію-detection та алерти. Для Anthropic без фреймворків: Langfuse зручніший."}],"examples":[{"title":"TracedClient: обгортка з structured logging та статистикою","language":"python","code":"import anthropic\nimport json\nimport time\nimport uuid\nimport logging\nfrom dataclasses import dataclass, field\nfrom typing import Any\n\n# Налаштування JSON-логера\nlogging.basicConfig(level=logging.INFO, format='%(message)s')\nlogger = logging.getLogger(\"agent.trace\")\n\n@dataclass\nclass CallStats:\n    input_tokens: int = 0\n    output_tokens: int = 0\n    total_calls: int = 0\n    total_latency_ms: float = 0.0\n    errors: int = 0\n\nclass TracedClient:\n    \"\"\"Anthropic client з автоматичним structured logging.\"\"\"\n\n    def __init__(self, trace_id: str | None = None):\n        self._client = anthropic.Anthropic()\n        self.trace_id = trace_id or str(uuid.uuid4())[:8]\n        self.stats = CallStats()\n        self.messages = self._client.messages  # for direct access if needed\n\n    def create(self, **kwargs) -> Any:\n        span_id = str(uuid.uuid4())[:8]\n        model = kwargs.get(\"model\", \"unknown\")\n        t_start = time.time()\n\n        log_entry = {\n            \"trace_id\": self.trace_id,\n            \"span_id\": span_id,\n            \"event\": \"llm_call_start\",\n            \"model\": model,\n            \"max_tokens\": kwargs.get(\"max_tokens\"),\n            \"has_tools\": bool(kwargs.get(\"tools\")),\n        }\n        logger.info(json.dumps(log_entry, ensure_ascii=False))\n\n        try:\n            response = self._client.messages.create(**kwargs)\n            latency_ms = (time.time() - t_start) * 1000\n\n            # Оновлюємо статистику\n            self.stats.input_tokens += response.usage.input_tokens\n            self.stats.output_tokens += response.usage.output_tokens\n            self.stats.total_calls += 1\n            self.stats.total_latency_ms += latency_ms\n\n            log_entry = {\n                \"trace_id\": self.trace_id,\n                \"span_id\": span_id,\n                \"event\": \"llm_call_end\",\n                \"model\": model,\n                \"input_tokens\": response.usage.input_tokens,\n                \"output_tokens\": response.usage.output_tokens,\n                \"stop_reason\": response.stop_reason,\n                \"latency_ms\": round(latency_ms, 1),\n            }\n            logger.info(json.dumps(log_entry, ensure_ascii=False))\n            return response\n\n        except Exception as e:\n            self.stats.errors += 1\n            logger.error(json.dumps({\n                \"trace_id\": self.trace_id,\n                \"span_id\": span_id,\n                \"event\": \"llm_call_error\",\n                \"error\": str(e),\n            }))\n            raise\n\n    def print_summary(self):\n        s = self.stats\n        avg_latency = s.total_latency_ms / s.total_calls if s.total_calls else 0\n        print(f\"\\n=== Trace {self.trace_id} ===\")\n        print(f\"  Calls: {s.total_calls}, Errors: {s.errors}\")\n        print(f\"  Tokens: in={s.input_tokens}, out={s.output_tokens}, total={s.input_tokens + s.output_tokens}\")\n        print(f\"  Avg latency: {avg_latency:.0f}ms\")\n\n# Демонстрація\nclient = TracedClient()\nfor question in [\"Що таке embeddings?\", \"Поясни MCP в одному реченні\"]:\n    resp = client.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=100,\n        messages=[{\"role\": \"user\", \"content\": question}]\n    )\nclient.print_summary()"}],"exercise":{"title":"Спостережуваний агент з аналізом витрат","task":"Обгорни існуючий agentic loop у TracedClient і проаналізуй витрати:\n1. Візьми агента з tool_use (наприклад з уроку 7 або 9) і заміни anthropic.Anthropic() на TracedClient()\n2. Розшир TracedClient: логуй tool_use події (назва інструменту, аргументи, latency)\n3. Виконай 5 різних запитів до агента\n4. Після виконання виведи аналіз:\n   - Який запит використав найбільше input_tokens?\n   - Який запит зайняв найбільше часу?\n   - Скільки разів кожен інструмент був викликаний?\n5. Збережи всі log entries у файл agent_traces.jsonl (one JSON per line)","hints":["tool_use логуй у той самий span або створюй дочірній span з parent_span_id",".jsonl формат (JSON Lines): кожен лог entry — окремий рядок, легко стрімити і читати построково","Для розрахунку приблизної вартості: Haiku input $0.80/1M tokens, output $4/1M; Sonnet input $3/1M, output $15/1M"]},"resources":[{"title":"Langfuse — open-source LLM observability","type":"docs","url":"https://langfuse.com/docs"},{"title":"Anthropic Docs — Usage and token counting","type":"docs","url":"https://docs.anthropic.com/en/docs/build-with-claude/token-counting"}]}},{"id":28,"topic":"Human-in-the-loop: коли зупинитись та спитати","outcome":"Агент знає межі своїх повноважень","instruction":{"description":"Агент що виконує дії в реальному світі (відправляє листи, видаляє файли, публікує контент) повинен знати коли зупинитись. Human-in-the-loop — не лише LangGraph interrupt: це архітектурний принцип визначення меж автономності агента. Урок показує коли і як реалізувати approval gates у production-системах.","duration_minutes":90,"key_concepts":["approval gate","abort criteria","confidence threshold","irreversible action","human review","escalation","uncertainty detection","audit log"],"theory":[{"title":"Коли агент повинен зупинитись","content":"Три категорії для обов'язкового HITL: (1) Необоротні дії — delete, send email, publish, pay, deploy; краще запитати ніж скасовувати наслідки. (2) Висока ціна помилки — медичні поради, юридичні рішення, фінансові транзакції; навіть 1% помилок неприйнятний. (3) Неоднозначний намір — запит можна інтерпретувати по-різному; замість вгадувати — спитай. Визначай ці категорії до деплою і фіксуй у системному промпті: агент повинен знати свої повноваження."},{"title":"Патерни approval gates","content":"Explicit approval: перед дією агент пояснює що збирається зробити, просить підтвердження, чекає відповіді. Confidence gate: перед виконанням агент оцінює власну впевненість (self-reflection: 'Наскільки я впевнений що правильно зрозумів задачу?'); якщо нижче порогу — ескалюй людині. Action classification: при кожному tool_use класифікуй дію як safe/risky/dangerous і застосовуй відповідний обробник. Для production: черга задач де оператор переглядає risky і dangerous через dashboard."},{"title":"Реалізація: від CLI до production та audit log","content":"CLI: input() для синхронного підтвердження — достатньо для прототипу. LangGraph: interrupt_before і app.update_state() (урок 23) — для граф-агентів. Production: агент пише proposed_action у базу, webhook сповіщає оператора, оператор підтверджує через API, агент отримує дозвіл і продовжує. Audit log — обов'язковий для compliance: зберігай кожну подію підтвердження (timestamp, actor, action, approved/rejected). Без audit log неможливо відповісти 'хто і коли дозволив цю дію'."}],"examples":[{"title":"Агент-помічник з email і класифікацією дій","language":"python","code":"import anthropic\nimport json\nfrom datetime import datetime\n\nclient = anthropic.Anthropic()\n\n# Audit log\naudit_log = []\n\ndef log_audit(action: str, approved: bool, actor: str = \"human\"):\n    entry = {\n        \"timestamp\": datetime.now().isoformat(),\n        \"action\": action,\n        \"approved\": approved,\n        \"actor\": actor,\n    }\n    audit_log.append(entry)\n    print(f\"  [AUDIT] {entry['timestamp'][:19]} — {action[:60]} — {'APPROVED' if approved else 'REJECTED'}\")\n\n# Класифікація дій за рівнем ризику\nACTION_RISK = {\n    \"read_email\": \"safe\",\n    \"search_emails\": \"safe\",\n    \"draft_email\": \"safe\",\n    \"send_email\": \"requires_approval\",\n    \"delete_email\": \"always_reject\",\n}\n\ndef approval_gate(action: str, details: str) -> bool:\n    risk = ACTION_RISK.get(action, \"requires_approval\")\n    if risk == \"safe\":\n        log_audit(f\"{action}: {details}\", True, actor=\"auto\")\n        return True\n    if risk == \"always_reject\":\n        print(f\"  [BLOCKED] Дія '{action}' заборонена в цій системі.\")\n        log_audit(f\"{action}: {details}\", False, actor=\"system\")\n        return False\n    # requires_approval: запитуємо людину\n    print(f\"\\n  Агент хоче виконати: {action}\")\n    print(f\"  Деталі: {details}\")\n    answer = input(\"  Дозволити? (y/n): \").strip().lower()\n    approved = answer == \"y\"\n    log_audit(f\"{action}: {details}\", approved)\n    return approved\n\n# Симульовані email-інструменти\nemail_tools = [\n    {\n        \"name\": \"read_email\",\n        \"description\": \"Прочитати вміст поштової скриньки\",\n        \"input_schema\": {\"type\": \"object\", \"properties\": {\"folder\": {\"type\": \"string\"}}, \"required\": [\"folder\"]}\n    },\n    {\n        \"name\": \"send_email\",\n        \"description\": \"Відправити email\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\n                \"to\": {\"type\": \"string\"},\n                \"subject\": {\"type\": \"string\"},\n                \"body\": {\"type\": \"string\"}\n            },\n            \"required\": [\"to\", \"subject\", \"body\"]\n        }\n    }\n]\n\ndef execute_tool(name: str, args: dict) -> str:\n    details = json.dumps(args, ensure_ascii=False)[:100]\n    if not approval_gate(name, details):\n        return f\"Дія {name} відхилена або заборонена.\"\n    # Симульоване виконання\n    if name == \"read_email\":\n        return f\"[MOCK] Папка '{args['folder']}': 3 листи — важливі справи.\"\n    if name == \"send_email\":\n        return f\"[MOCK] Email відправлено до {args['to']}.\"\n    return \"Невідомий інструмент\"\n\n# Агент\nmessages = [{\"role\": \"user\", \"content\": \"Перевір inbox і відправ відповідь на перший лист.\"}]\n\nwhile True:\n    resp = client.messages.create(\n        model=\"claude-haiku-4-5-20251001\", max_tokens=512,\n        system=\"Ти email-помічник. Використовуй доступні інструменти для роботи з поштою.\"
